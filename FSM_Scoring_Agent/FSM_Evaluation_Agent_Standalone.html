<style>
  /* SSA brand tokens (from the SSA brand spec). */
  :root{
    --ssa-blue:#003399; --ssa-teal:#336179; --ssa-light:#B8CFFF;
    /* Cross-browser sticky offsets: adjust if your header/nav sizes change */
    --header-height: 0px; /* space above the sticky nav (e.g. banner) */
    --nav-tabs-height: 56px; /* height of the sticky nav.tabs (default) */
    --ink:#0f1b33; --muted:#5b6677; --line:#E0E4EA; --surface:#FAFBFC;
    --good:#1f7a4d; --warn:#D97706; --bad:#b3261e; --steel:#8BA4C4;
    --font:'Avenir Next LT Pro','Avenir','Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--surface);line-height:1.45}
  a{color:var(--ssa-blue)}
  .wrap{max-width:1440px;margin:0 auto;padding:0 30px}
  /* Header */
  header.app{background:linear-gradient(90deg,var(--ssa-blue),var(--ssa-teal));color:#fff}
  /* `bar` collides with the generic progress-bar rule below; reset its leaked props so the header gradient shows. */
  header.app .bar{display:flex;align-items:center;gap:18px;padding:18px 30px;max-width:1440px;margin:0 auto;background:transparent;height:auto;border-radius:0;overflow:visible}
  header.app img{height:34px}
  header.app .title{font-size:15px;font-weight:600;letter-spacing:.2px;opacity:.95;border-left:1px solid rgba(255,255,255,.35);padding-left:18px}
  header.app .title small{display:block;font-weight:400;opacity:.8;font-size:12px}
  header.app .spacer{flex:1}
  /* Model selector */
  .modelsel{display:flex;align-items:center;gap:8px;font-size:12px}
  .modelsel select{font-family:var(--font);font-size:12px;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.12);color:#fff}
  .modelsel select option{color:#000}
  .modelsel label{opacity:.85}
  .keypill{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.18)}
  /* Nav */
  nav.tabs{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  nav.tabs .inner{display:flex;gap:4px;max-width:1440px;margin:0 auto;padding:0 30px;overflow-x:auto}
  nav.tabs button{background:none;border:none;padding:15px 18px;font-family:var(--font);font-size:14px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
  nav.tabs button.active{color:var(--ssa-blue);border-bottom-color:var(--ssa-blue);font-weight:600}
  /* Cards & layout */
  .grid{display:grid;gap:22px}
  .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:22px}
  .card h3{margin:0 0 6px;font-size:16px;line-height:1.25;color:var(--ssa-blue)}
  .card .sub{color:var(--muted);font-size:12px;margin-bottom:12px}
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:34px 0 12px;font-weight:600}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  /* Vote badges */
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .b-Recommend{background:#e4f3ea;color:var(--good)}
  .b-Shortlist{background:#fff2db;color:var(--warn)}
  .b-Reject,.b-Disqualified{background:#fae6e4;color:var(--bad)}
  /* Score ring */
  .ring{display:flex;align-items:center;gap:14px}
  .ring .num{font-size:30px;font-weight:700;color:var(--ssa-blue);line-height:1}
  .ring .den{font-size:13px;color:var(--muted)}
  .score-stack{display:grid;grid-template-columns:repeat(3,minmax(150px,1fr));gap:14px;margin-top:12px}
  .score-tile{border:1px solid var(--line);border-radius:8px;padding:14px 16px;min-height:88px;display:flex;flex-direction:column;justify-content:center}
  .score-tile .num{font-size:32px;font-weight:700;color:var(--ssa-blue);line-height:1}
  .score-tile .den{font-size:12.5px;color:var(--muted);margin-top:5px}
  /* Bars */
  .bar{height:9px;background:#eef1f6;border-radius:6px;overflow:hidden}
  .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--ssa-blue),var(--ssa-teal))}
  .rowbar{display:grid;grid-template-columns:minmax(180px,240px) 1fr 64px;gap:14px;align-items:center;margin:10px 0;font-size:13px;line-height:1.25}
  .rowbar .lbl{color:var(--ink)}
  .rowbar .val{text-align:right;font-variant-numeric:tabular-nums;color:var(--muted)}
  /* Table */
  table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.35}
      th{color:var(--muted);font-weight:600;cursor:pointer;user-select:none;background:#fff}
  .table-scroll{overflow:auto}
  .dashboard-table{min-width:920px}
  .requirement-table{min-width:980px}
  .requirement-table th{position:sticky;top:0;z-index:10;-webkit-backface-visibility:hidden;backface-visibility:hidden;transform:translateZ(0)}
  .requirement-table-wrap{max-height:560px;border:1px solid var(--line);border-radius:8px}
  td.code{font-weight:600}
  .tag{font-size:10px;padding:1px 6px;border-radius:4px;background:#eef1f6;color:var(--muted)}
  .met-Yes{color:var(--good);font-weight:600}.met-Partial{color:var(--warn);font-weight:600}
  .met-No{color:var(--bad);font-weight:600}.met-NA{color:var(--steel)}
  .conf-Low{color:var(--bad)}.conf-Medium{color:var(--warn)}.conf-High{color:var(--good)}
  /* Buttons */
  .btn{background:var(--ssa-blue);color:#fff;border:none;border-radius:7px;padding:9px 16px;font-family:var(--font);font-size:13px;cursor:pointer}
  .btn:hover{background:#00257a}
  .btn.ghost{background:#fff;color:var(--ssa-blue);border:1px solid var(--ssa-blue)}
  .btn:disabled{opacity:.5;cursor:default}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted)}
  /* Chat */
  .chat{display:flex;flex-direction:column;height:calc(100vh - 230px);min-height:420px}
  .chat .log{flex:1;overflow-y:auto;padding:6px 2px}
  .msg{margin:10px 0;max-width:85%;padding:11px 14px;border-radius:12px;font-size:13.5px;white-space:pre-wrap;line-height:1.5}
  .msg.user{margin-left:auto;background:var(--ssa-blue);color:#fff;border-bottom-right-radius:3px}
  .msg.bot{background:#fff;border:1px solid var(--line);border-bottom-left-radius:3px}
  .msg .ground{margin-top:8px;font-size:10.5px;color:var(--muted)}
  .chat .inputrow{display:flex;gap:8px;margin-top:12px}
  .chat input{flex:1;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-family:var(--font);font-size:14px}
  /* Footer */
  footer.app{padding:24px 22px;color:var(--muted);font-size:11.5px;text-align:center;border-top:1px solid var(--line);margin-top:30px}
  .demowarn{background:#fff7e6;border:1px solid #f0d9a8;color:#8a5a00;font-size:12px;padding:8px 12px;border-radius:8px;margin:14px 0}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--ssa-light);border-top-color:var(--ssa-blue);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  .kpi{display:flex;gap:18px 28px;flex-wrap:wrap}
  .kpi .k{font-size:12px;color:var(--muted)}.kpi .k b{display:block;font-size:20px;color:var(--ink)}
  .detail-hero{grid-template-columns:minmax(0,1.35fr) minmax(340px,.85fr);align-items:stretch}
  .detail-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .vote-columns{grid-template-columns:repeat(2,minmax(0,1fr));margin-top:12px}
  .vendor-pills{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .requirement-controls{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .runbar-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .source-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;align-items:start}
  .research-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 24px}
  .heatmap-card{padding:18px;overflow:auto}
  .heatmap{display:grid;gap:8px}
  .heatmap-row{display:grid;gap:8px;align-items:stretch}
  .heatmap-head{font-size:11px;text-transform:uppercase;letter-spacing:.45px;color:var(--muted);align-items:end}
  .heatmap-vendor{border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:#fff}
  .heatmap-vendor b{display:block;color:var(--ink)}
  .heatmap-vendor span{font-size:11.5px;color:var(--muted)}
  .heatcell{border:1px solid var(--line);border-radius:8px;padding:9px 8px;min-height:64px;display:flex;flex-direction:column;justify-content:space-between}
  .heatcell span{font-size:11px;color:var(--muted)}
  .heatcell strong{font-size:18px;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
  .heatcell small{font-size:10.5px;color:var(--muted)}
  .heat-high{background:#e6f3ec;border-color:#bddcc9}
  .heat-mid{background:#edf3fb;border-color:#c9d9ed}
  .heat-warn{background:#fff5df;border-color:#edd6a8}
  .heat-low{background:#fae8e6;border-color:#ecc2bd}
  @media (max-width: 1080px){
    .detail-hero,.detail-grid,.vote-columns,.source-grid,.research-grid{grid-template-columns:1fr!important}
    .score-stack{grid-template-columns:repeat(3,minmax(0,1fr))}
    .rowbar{grid-template-columns:minmax(150px,220px) 1fr 58px}
  }
  @media (max-width: 720px){
    .wrap,header.app .bar,nav.tabs .inner{padding-left:18px;padding-right:18px}
    header.app .bar{align-items:flex-start;flex-direction:column}
    header.app .title{border-left:0;padding-left:0}
    header.app .spacer{display:none}
    .score-stack{grid-template-columns:1fr}
    .rowbar{grid-template-columns:1fr;gap:6px}
    .rowbar .val{text-align:left}
    .card{padding:18px}
  }
</style>
</head>

ce the facts are in. Consultative in the room, but unafraid to cut a vendor that fails a non-negotiable. Reframes ambiguity into segments rather than forcing false precision; proves value on a small sample before escalating.", "tenets": ["Anchor to facts and data; distrust numbers that look too good ('I doubt that number is accurate').", "Prove the juice is worth the squeeze on a small sample before any harder conversation.", "Don't force false precision; iterate and segment when uncertain.", "Read stakeholder motives sharply, but never take sides \u2014 'that's not our role'.", "Decisive about the shape of the answer: when the evidence is in, 'we don't need to keep talking'."]}, "priorities_ranked": [{"rank": 1, "name": "Data, integration & a clean common model", "why": "The only thing you can truly commonalize across ~60 diverse OpCos is the data. Native, proven, two-way integration and open data access are the north star.", "quote": "The only thing you can really commonalize ... is the data."}, {"rank": 2, "name": "Requirement fit that traces to real outcomes", "why": "Largest scorecard weight (35%). But only fit that MATTERS \u2014 reward differentiation, not requirement theater.", "quote": "a lot of these things are fairly meaningless when it comes to actual success"}, {"rank": 3, "name": "Operating-model flexibility across OpCos", "why": "A platform must support 4-6 process overlays, not demand everyone works the same way.", "quote": "Do they demand that everyone works the same way?"}, {"rank": 4, "name": "Technician adoption as the precondition", "why": "Without field adoption, no other capability pays off. Don't reward features the field won't use.", "quote": "we're never going to manage our people to that level of granularity"}, {"rank": 5, "name": "Architecture/scale minimums and TCO", "why": "Scale and single-tenancy are gates, not trade-offs; cost weighs into choices and sequencing.", "quote": "either it is scalable or it's not"}], "red_flags": [{"flag": "Generic, one-size FSM pitch", "trigger": "Response reads like a generic deck, not tailored to a ~60-OpCo PE-backed HVAC rollup.", "penalty": "Caps Understanding category; signals weak fit."}, {"flag": "Black-box platform / no data access", "trigger": "Customer cannot get at all of its own data, or AI/data is locked.", "penalty": "Near-disqualifying. 'If I don't have access to all the data ... we don't need to keep talking.'"}, {"flag": "Requirements theater / inflated must-haves", "trigger": "Overstated OOB claims, vague evidence, everything marked as fully met.", "penalty": "Lowers quality scores; raises confidence-discount."}, {"flag": "Vaporware / roadmap promises in place of GA capability", "trigger": "ROADMAP or CUSTOM used to answer Must requirements without a firm SOW/GA date.", "penalty": "Treat as not-met for gating; heavy quality penalty."}, {"flag": "Win-it-then-disappear vendor behavior", "trigger": "A-team in the sales chase, unknown faces post-signature.", "penalty": "Lowers Qualifications (support/partnership) score."}, {"flag": "Data-capture tool masquerading as a workflow engine", "trigger": "Logs data but does not orchestrate/gate the work-to-cash workflow.", "penalty": "Lowers Requirement Alignment, especially W2C."}, {"flag": "Forced process uniformity", "trigger": "Platform cannot support multiple overlays / local configurability within guardrails.", "penalty": "Lowers OpCo-fit, especially for residential and project-heavy archetypes."}], "weighting_doctrine": {"principle": "Weight by DECISION LEVERAGE, not nominal importance. A capability everyone meets equally should barely move the score; points are won where vendors actually differentiate.", "quote": "the weighting really is not ... how important each one of them is, it's how much does it factor into our decision making for picking the strategic system", "implications": ["Treat scale, single-tenancy, data access, union/non-union isolation, and SOX/compliance as GATES (minimum thresholds), then score on evidenced differentiation above the gate.", "Reward OOB/CONFIG over CUSTOM/ROADMAP; reward proven references over assertions.", "Differentiators that move the decision: integration breadth (out-of-the-box connectors), API/data openness, operating-model flexibility, project financials, and offline mobile adoption."]}, "agentic_future_doctrine": {"summary": "AI is central, but as a strategic lens on openness and data control \u2014 not a feature checkbox. The platform's openness and data access matter more than any single AI feature it ships today, because AI solutions are transient and almost disposable.", "principles": ["Define an AI-first approach to close requirement gaps a vendor can't meet OOB; ask 'is there an AI way to fulfill that capability?'", "Favor autonomy with human exception-handling ('straight-through processing'; humans focused on the 1%).", "Anti-black-box: a locked platform means an OpCo can't control its own AI destiny \u2014 a major negative.", "Openness/data access > shipped AI features, because 'if we get three months of benefit out of something that takes us a day to write, great.'", "Raise the floor before racing the ceiling: don't widen OpCo disparity by over-indexing on bleading-edge AI."], "quote": "those requirements that the vendors can't meet ... we will define an AI driven approach ... an AI first approach"}, "opco_diversity_doctrine": {"summary": "Reject forced uniformity. One platform, 4-6 common process overlays, data as the true common layer. Raise the floor across low-maturity OpCos rather than over-serving the sophisticated few.", "quotes": ["the notion that you're going to come up with a single standard process for all of these companies ... is a fool's errand", "the company's health is better served by raising the floor before ... shooting too far forward on AI enablement"]}, "process_lessons": ["Don't over-invest in interviewing users for requirements; mine evidence (the system data) instead.", "Don't let the FSM tool tunnel-vision the decision \u2014 meeting all capabilities needs an ecosystem, not one platform.", "Validate before escalating; prove value cheaply first.", "Beware data that flatters a prior leader; distinguish genuine efficiency from a simpler business.", "Split business-user scoring from corporate scoring; averaging business weights drowns out corporate must-haves (SOX, scalability) that local users don't even know to ask about.", "Don't over-credit asset/equipment data 'yes' answers \u2014 verify ('if you can produce a list, you're probably at a four or five').", "Sequencing matters: pilot a willing, smaller OpCo, not the one that thinks it's better than the solution."], "voice": {"register": "Plain-spoken, direct, dry humor. Senior-partner candor. Uses concrete operator language over consultant jargon. Comfortable issuing a clear verdict and naming the risk.", "signature_phrases": ["Let's prove the juice is worth the squeeze.", "That's a fool's errand.", "It's like, come on.", "Is there an AI way to fulfill that capability?", "Do they demand that everyone works the same way?", "I can't rely on a black box.", "Raise the floor before racing the ceiling.", "Once you buy, it's like, 'who are you again?'"], "do": ["Lead with the verdict, then the why.", "Name the single biggest risk explicitly.", "Tie features to dollars (revenue leakage, DSO, billing lag).", "Flag what still must be proven in the demo."], "dont": ["Hedge into mush.", "Reward generic pitches.", "Take stakeholder political sides.", "Treat roadmap promises as delivered capability."]}}, "scorecard": {"source_rfp": "Service Logic - Field Service Management Platform RFP (Version E, 2026-06-02)", "source_instrument": "Service Logic FSM RFP - Vendor Scorecard v1.xlsx", "note": "Two scoring lenses exist and are both encoded. (1) SSA scorecard categories (this file) and (2) the RFP Section 30 capability-weighted lens (capabilities.json). The agent reports both; the SSA category weighting drives the headline weighted total.", "categories": [{"id": "understanding", "name": "Understanding of Service Logic", "weight": 0.1, "tab": "1. Understanding", "good_looks_like": "Reflects the multi-OpCo, PE-backed, acquisitive, union/CBA reality and the Work-to-Cash priority; not a generic FSM pitch."}, {"id": "completeness", "name": "Completeness of Response", "weight": 0.1, "tab": "2. Completeness", "good_looks_like": "Every requirement carries a response code; all 28 qualification and all pricing questions answered with specifics; demo-ready."}, {"id": "architecture", "name": "Vendor Platform Architecture", "weight": 0.15, "tab": "3. Architecture", "good_looks_like": "Single-tenant topology w/ SOC2 Type II; proven scale to 80+ entities / 2,000+ concurrent / 3,500+ techs; open API + event integration; offline mobile; upgrade-safe config; security & DR posture."}, {"id": "qualifications", "name": "Vendor Qualifications", "weight": 0.15, "tab": "4. Qualifications", "good_looks_like": "Financial stability, HVAC/union/multi-entity references at comparable scale, credible implementation model, real customer-success structure."}, {"id": "requirement_alignment", "name": "Requirement Alignment", "weight": 0.35, "tab": "5. Requirement Alignment", "good_looks_like": "OOB/CONFIG coverage of Must and Should requirements across all functional domains, with evidence; CUSTOM/ROADMAP minimized and justified."}, {"id": "financials", "name": "Financials & Commercial Model", "weight": 0.15, "tab": "6. Financials", "good_looks_like": "Transparent, role-based, volume-tiered pricing; no hidden fees; free data export; competitive 3-/5-year TCO for Service Logic scale."}], "quality_scale": {"5": "High - Excellent: fully meets the need out-of-the-box; differentiated, proven, well-evidenced.", "4": "Good: meets the need via standard configuration; strong, credible response.", "3": "Average/Adequate: meets the need but with caveats, moderate effort, or thin evidence.", "2": "Below Average: partially meets the need; meaningful gaps, customization, or risk.", "1": "Low - Poor: does not meaningfully meet the need; gap, vague, or unsupported."}, "met_values": {"Yes": "Capability fully provided as described.", "Partial": "Partially provided; some aspects unmet or need work.", "No": "Not provided and no acceptable path to it.", "N/A": "Not applicable (e.g., a 'Won't' requirement)."}, "response_codes": {"OOB": "Out of the box - fully supported in current GA release, no modifications.", "CONFIG": "Configurable via admin configuration, no code changes.", "EXTENSION": "Built using the product's extensible framework.", "CUSTOM": "Custom development - scripting or code-level changes required.", "PARTNER": "Delivered via certified third-party / ISV / marketplace partner.", "ROADMAP": "Planned / not yet available; published future release.", "GAP": "Not supported and no published roadmap."}, "moscow": {"Must": "Non-negotiable. A 'No' (or unsupported ROADMAP/CUSTOM without firm SOW) on any Must is a basis for disqualification.", "Should": "High priority; expected of a market-leading platform. Absence hurts scoring.", "Could": "Desirable differentiator; not required for initial deployment.", "Won't": "Explicitly out of scope; no response required."}, "gating_rules": {"must_no_disqualifies": true, "must_requires_oob_or_config": true, "custom_must_needs_firm_sow": true, "single_tenant_required": true, "union_nonunion_isolation_required": true, "description": "Any Must marked No -> disqualifying. A Must answered ROADMAP, GAP, or CUSTOM-without-SOW is treated as effectively unmet for gating. Single-tenant deployment and absolute entity-level union/non-union data isolation are hard architectural gates."}, "requirement_priority_mix": {"Must": 278, "Should": 123, "Could": 15, "total_functional": 397, "total_rows_incl_nfr": 416}, "confidence_model": {"levels": ["High", "Medium", "Low"], "drivers": {"raise": ["Concrete evidence cited (references, screenshots, named customers)", "OOB/CONFIG with proof", "Consistent across the response"], "lower": ["Assertion without evidence", "ROADMAP/CUSTOM", "Inconsistencies or overstated claims", "Capability must be validated in live demo (Appendix F)"]}, "rule": "Every score carries a confidence level and an explicit list of evidence gaps that must be closed (typically in the July 13-16 Charlotte demos or reference checks)."}}, "capabilities": {"source": "RFP Section 30 / Table 64 (the capability scheme whose codes actually tag the 397 requirements).", "scoring_method": "Each capability scored 1-5, derived from the requirement-level responses tagged with its code, emphasizing OOB/CONFIG coverage of Must and Should items; then weighted and aggregated.", "value_signal": "KPI gap analysis shows only 5 of 66 KPIs are deliverable today; the biggest measurable value concentrates in W2C (billing velocity / ~$6.8M revenue leakage), TPA (offline mobile + field data capture), and PJE (project WIP/ASC 606).", "capabilities": [{"code": "W2C", "name": "Work-to-Cash Velocity", "weight": 0.25, "domains": ["A", "D", "E", "F"], "what_matters": "Gated WO completion -> billing -> cash; close the 15-30 day billing lag; NTE alerts at 50/75/90%; eliminate revenue leakage; zero-touch auto-bill; GL-coding accuracy.", "value": "Single largest operational improvement opportunity; ~$6.8M portfolio revenue-leakage exposure."}, {"code": "TPA", "name": "Technician Productivity & Adoption", "weight": 0.2, "domains": ["A", "L"], "what_matters": "Native offline mobile (iOS 16+/Android 12+, not PWA); fast job close-out; auto-capture (OCR data plates); guided/gated workflows that reduce the chance to pick the wrong job.", "value": "Precondition for all other value; lack of offline is the #1 technician complaint."}, {"code": "PJE", "name": "Project Execution & Financial Control", "weight": 0.15, "domains": ["B"], "what_matters": "WBS, WIP, ASC 606 percentage-of-completion, AIA G702/G703 progress billing, retainage, change orders, certified/prevailing wage, per-job rate overrides.", "value": "Protects >$1B in project revenue and margin."}, {"code": "ACQ", "name": "Acquisition Onboarding Speed", "weight": 0.1, "domains": ["H", "J", "N"], "what_matters": "Repeatable 6-8 week OpCo onboarding playbook; rapid data migration; configurable overlays for newly acquired entities.", "value": "5-7 acquisitions/year; onboarding speed compounds across the portfolio."}, {"code": "EVG", "name": "Enterprise Visibility & Governance", "weight": 0.1, "domains": ["G", "M"], "what_matters": "Cross-OpCo standardized KPIs and benchmarking; 3-click drill-down; global-vs-entity governance; open data access for customer-built analytics/AI.", "value": "No standardized KPIs today; wide OpCo variance (e.g., DSO, first-call resolution)."}, {"code": "RLC", "name": "Regulatory & Labor Compliance", "weight": 0.1, "domains": ["A5", "B4", "K"], "what_matters": "Multi-tier CBA wage determination, certified payroll, Davis-Bacon/prevailing wage, blended crews, absolute union/non-union entity isolation, SOX ITGC, SoD, immutable audit, IPO/SEC readiness.", "value": "Hard disqualification risk despite moderate weight; PE/IPO posture is non-negotiable."}, {"code": "CXR", "name": "Customer Experience & Retention", "weight": 0.05, "domains": ["C"], "what_matters": "Authorized-caller validation, equipment/asset history, customer comms (e.g., 'tech is 10 minutes away'), national-accounts consolidation.", "value": "Retention and national-accounts transparency."}, {"code": "SCL", "name": "Scalable Platform Architecture", "weight": 0.05, "domains": ["H", "I", "K"], "what_matters": "Single-tenant; 40+ -> 80+ entities without re-architecture; 2,000+ concurrent; 99.9% uptime; RPO<1h/RTO<4h; US (and Canada) residency; open API/event integration.", "value": "Architectural gate for the whole portfolio."}]}, "segments": {"source": "OpCo_Segmentation_Framework_v17.xlsx, Business Capabilities Matrix, Current-State Process Analysis, and segmentation transcripts (May <script type="text/babel">
const {useState, useEffect, useMemo, useRef} = React;
const API = ""; // same origin (Flask serves this file)

// STATIC mode: when a build inlines window.__BOOT__, the app runs with no backend
// (great for a double-clickable, server-free demo). Live evaluate/chat then fall back
// to the offline demo behaviour client-side.
const BOOT = (typeof window!=="undefined" && window.__BOOT__) ? window.__BOOT__ : null;
const STATIC = !!BOOT;

// ---- helpers -------------------------------------------------------------
const fmt = n => (n===undefined||n===null) ? "—" : (Math.round(n*10)/10);
const scoreTone = n => n>=4 ? "heat-high" : n>=3.25 ? "heat-mid" : n>=2.5 ? "heat-warn" : "heat-low";
async function jget(u){
  if(STATIC){
    if(u.endsWith("/models")) return BOOT.models;
    if(u.endsWith("/results")) return BOOT.results;
    if(u.endsWith("/vendors")) return {vendors:BOOT.vendors};
    if(u.endsWith("/knowledge")) return BOOT.knowledge;
    if(u.endsWith("/health")) return {ok:true,live_models_available:false,n_results:BOOT.results.length};
    return {};
  }
  const r=await fetch(API+u);return r.json();
}
async function jpost(u,b){
  if(STATIC){
    if(u.endsWith("/chat")) return {answer:"[standalone demo] This double-clickable build has no backend, so it can't call a model. Run the Flask server (see README) and select a model to get synthesized answers. The grounded knowledge base and all precomputed results are fully browsable here.",grounding:["scorecard","capabilities","evaluations"],is_demo:true};
    if(u.endsWith("/evaluate")){ const r=BOOT.results.find(x=>x.vendor===b.vendor); return r||{error:"Run the server to evaluate new vendors."}; }
    return {};
  }
  const r=await fetch(API+u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});return r.json();
}
const recoClass = r => "badge b-"+(r||"").replace(/[^A-Za-z]/g,"");

// ---- score bar row -------------------------------------------------------
function BarRow({label, value, max=5, suffix="/5"}){
  const pct = Math.max(0, Math.min(100, (value/max)*100));
  return (
    <div className="rowbar">
      <div className="lbl">{label}</div>
      <div className="bar"><span style={{width:pct+"%"}}/></div>
      <div className="val">{fmt(value)}{suffix}</div>
    </div>
  );
}

function CapabilityHeatmap({results}){
  const caps = results[0]?.capabilities || [];
  if(!caps.length) return null;
  const columns = `minmax(180px,1.2fr) repeat(${caps.length}, minmax(74px,1fr))`;
  return (
    <div className="card heatmap-card">
      <div className="heatmap">
        <div className="heatmap-row heatmap-head" style={{gridTemplateColumns:columns}}>
          <div>Vendor</div>
          {caps.map(c=><div key={c.code}>{c.code}</div>)}
        </div>
        {results.map(r=>(
          <div className="heatmap-row" style={{gridTemplateColumns:columns}} key={r.vendor}>
            <div className="heatmap-vendor">
              <b>{r.vendor}</b>
              <span>{r.vote.recommendation} · {fmt(r.weighted_total)}/100</span>
            </div>
            {caps.map(cap=>{
              const c = r.capabilities.find(x=>x.code===cap.code) || {};
              return (
                <div key={cap.code} className={"heatcell "+scoreTone(c.score_1_5 || 0)}
                     title={`${cap.name}: ${fmt(c.score_1_5)}/5`}>
                  <span>{cap.code}</span>
                  <strong>{fmt(c.score_1_5)}</strong>
                  <small>{c.n_unmet_must ? `${c.n_unmet_must} unmet Must` : "/5"}</small>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

// ---- model controls (header) --------------------------------------------
function Picker({models,value,onChange,title}){
  return (
    <select title={title||""} value={value} onChange={e=>onChange(e.target.value)}
            style={{fontFamily:"var(--font)",fontSize:12,padding:"6px 8px",borderRadius:6,
                    border:"1px solid rgba(255,255,255,.4)",background:"rgba(255,255,255,.12)",color:"#fff"}}>
      {models.providers.map(p=>(
        <optgroup key={p.id} label={p.name+(p.key_present?"":" (no key)")}>
          {p.models.map(m=>(<option key={m.id} value={m.id} disabled={!p.key_present && p.id!=="mock"}
             style={{color:"#000"}}>{m.label}{!p.key_present&&p.id!=="mock"?" — key missing":""}</option>))}
        </optgroup>
      ))}
    </select>
  );
}
function ModelControls({models, scoring, setScoring, voteMode, setVoteMode, voteModel, setVoteModel, voteDual, setVoteDual}){
  if(!models) return null;
  return (
    <div className="modelsel" style={{gap:12,flexWrap:"wrap"}}>
      <span style={{display:"flex",alignItems:"center",gap:6}}>
        <label>Scoring</label><Picker models={models} value={scoring} onChange={setScoring}/>
      </span>
      <span style={{display:"flex",alignItems:"center",gap:6}}>
        <label>Vote</label>
        <select value={voteMode} onChange={e=>setVoteMode(e.target.value)}
                style={{fontSize:12,padding:"6px 8px",borderRadius:6,border:"1px solid rgba(255,255,255,.4)",background:"rgba(255,255,255,.12)",color:"#fff"}}>
          <option value="single" style={{color:"#000"}}>Single model</option>
          <option value="dual" style={{color:"#000"}}>Dual (two-model read)</option>
        </select>
      </span>
      {voteMode==="single"
        ? <Picker models={models} value={voteModel} onChange={setVoteModel} title="Vote model"/>
        : <span style={{display:"flex",alignItems:"center",gap:6}}>
            <Picker models={models} value={voteDual.openai} onChange={v=>setVoteDual({...voteDual,openai:v})} title="OpenAI vote model"/>
            <span style={{opacity:.7}}>+</span>
            <Picker models={models} value={voteDual.anthropic} onChange={v=>setVoteDual({...voteDual,anthropic:v})} title="Anthropic vote model"/>
            <span className="keypill" title="Reconciler (fixed)">&#8635; Opus 4.8 reconciles</span>
          </span>}
    </div>
  );
}

// ---- dashboard (head-to-head) -------------------------------------------
function Dashboard({results, onOpen}){
  const ranked = useMemo(()=>[...results].sort((a,b)=>
     (a.gating.disqualified-b.gating.disqualified) || (b.weighted_total-a.weighted_total)),[results]);
  if(!results.length) return <p className="muted">No evaluations yet. Use "Run evaluation" above.</p>;
  return (
    <div>
      <div className="section-title">Head-to-head ranking — the agent’s vote</div>
      <div className="card" style={{padding:0}}>
        <div className="table-scroll">
        <table className="dashboard-table">
          <thead><tr>
            <th>#</th><th>Vendor</th><th>SSA total</th><th>Capability</th>
            <th>Agentic future</th><th>Gate</th><th>Vote</th><th></th>
          </tr></thead>
          <tbody>
          {ranked.map((r,i)=>(
            <tr key={r.vendor}>
              <td>{i+1}</td>
              <td><b>{r.vendor}</b><div className="small muted">{r.product}</div></td>
              <td><b style={{color:"var(--ssa-blue)",fontSize:15}}>{fmt(r.weighted_total)}</b><span className="muted small">/100</span></td>
              <td>{fmt(r.capability_weighted_total)}<span className="muted small">/100</span></td>
              <td>{fmt(r.agentic_future.score_1_5)}/5 <span className="pill">{r.agentic_future.data_control_risk} risk</span></td>
              <td>{r.gating.disqualified
                  ? <span className="met-No">{r.gating.unmet_must_count} unmet Must</span>
                  : <span className="met-Yes">pass</span>}</td>
              <td><span className={recoClass(r.vote.recommendation)}>{r.vote.recommendation}</span></td>
              <td><button className="btn ghost small" onClick={()=>onOpen(r.vendor)}>Detail →</button></td>
            </tr>
          ))}
          </tbody>
        </table>
        </div>
      </div>

      <div className="section-title">Capability field map (1–5)</div>
      <CapabilityHeatmap results={ranked}/>
    </div>
  );
}

// ---- vendor detail -------------------------------------------------------
function VendorDetail({data}){
  const [sortKey,setSortKey]=useState("priority");
  const [filter,setFilter]=useState("");
  const [capFilter,setCapFilter]=useState("ALL");
  if(!data) return null;
  const r=data;
  let rows=[...r.requirement_scores];
  if(capFilter!=="ALL") rows=rows.filter(x=>x.capability===capFilter);
  if(filter){ const f=filter.toLowerCase();
    rows=rows.filter(x=>(x.rid+" "+x.rationale+" "+x.evidence_gap+" "+x.vendor_code).toLowerCase().includes(f)); }
  const order={Must:0,Should:1,Could:2,"Won't":3};
  rows.sort((a,b)=> sortKey==="priority" ? (order[a.priority]-order[b.priority])||(a.quality-b.quality)
                 : sortKey==="quality" ? a.quality-b.quality
                 : a.rid.localeCompare(b.rid));
  const caps=[...new Set(r.requirement_scores.map(x=>x.capability))];
  return (
    <div>
      {/* Headline */}
      <div className="grid detail-hero">
        <div className="card">
          <h3>{r.vendor} <span className="muted small">{r.product}</span></h3>
          <div className="score-stack">
            <div className="score-tile"><div className="num">{fmt(r.weighted_total)}</div><div className="den">/100 SSA weighted</div></div>
            <div className="score-tile"><div className="num" style={{color:"var(--ssa-teal)"}}>{fmt(r.capability_weighted_total)}</div><div className="den">/100 capability lens</div></div>
            <div className="score-tile"><span className={recoClass(r.vote.recommendation)} style={{fontSize:14,alignSelf:"flex-start"}}>{r.vote.recommendation}</span>
                 <div className="den">vote · {r.vote.confidence} confidence</div></div>
          </div>
          <div style={{marginTop:10}} className={"demowarn"} hidden={!r.is_demo}>
            Offline demo engine (no model key). Scores are grounded in the research dossier, not a live read of a real proposal.
          </div>
        </div>
        <div className="card">

// ---- chat ----------------------------------------------------------------
function Chat({model}){
  const [log,setLog]=useState([{role:"bot",content:"Ask me anything about the evaluation — why a vendor scored as it did, how the Must gate works, which platform fits the small low-maturity OpCos, the agentic-future read, etc. I answer grounded in the knowledge base and this session’s results."}]);
  const [q,setQ]=useState(""); const [busy,setBusy]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[log,busy]);
  async function send(){
    if(!q.trim()||busy) return;
    const question=q.trim(); setQ("");
    const hist=log.filter(m=>m.role!=="sys").map(m=>({role:m.role==="bot"?"assistant":"user",content:m.content}));
    setLog(l=>[...l,{role:"user",content:question}]); setBusy(true);
    const res=await jpost("/api/chat",{question,model_id:model,history:hist});
    setLog(l=>[...l,{role:"bot",content:res.answer,ground:res.grounding,demo:res.is_demo}]); setBusy(false);
  }
  const examples=["Why is Salesforce disqualified?","Which platform fits the small low-maturity OpCos best?","How does the Must gate work?","Give me the agentic-future read on ServiceTitan."];
  return (
    <div className="chat">
      <div className="log">
        {log.map((m,i)=>(
          <div key={i} className={"msg "+(m.role==="user"?"user":"bot")}>
            {m.content}
            {m.ground && <div className="ground">grounded in: {m.ground.join(", ")}{m.demo?" · demo (no model key)":""}</div>}
          </div>
        ))}
        {busy && <div className="msg bot"><span className="spin"></span> thinking…</div>}
        <div ref={endRef}/>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
        {examples.map((e,i)=>(<button key={i} className="pill" style={{cursor:"pointer"}} onClick={()=>setQ(e)}>{e}</button>))}
      </div>
      <div className="inputrow">
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}
               placeholder="Ask the evaluation agent…"/>
        <button className="btn" onClick={send} disabled={busy}>Send</button>
      </div>
    </div>
  );
}

// ---- run-evaluation control: upload files + URLs, or use sample ----------
function RunBar({vendors, model, voteMode, voteModel, voteDual, onDone}){
  const [vendor,setVendor]=useState("");
  const [files,setFiles]=useState([]);          // File[]
  const [urls,setUrls]=useState("");            // newline/comma separated
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);            // {ok, text, ingest?}
  const [prog,setProg]=useState(null);
  const [jobId,setJobId]=useState(null);
  const cancelledRef=useRef(false);
  const fileRef=useRef(null);
  useEffect(()=>{ if(vendors.length && !vendor) setVendor(vendors[0].name); },[vendors]);

  const ACCEPT=".pdf,.docx,.xlsx,.xlsm,.txt,.md";
  function addFiles(list){ setFiles(f=>[...f, ...Array.from(list)]); }
  function removeFile(i){ setFiles(f=>f.filter((_,j)=>j!==i)); }

  function votePayload(){
    return voteMode==="dual" ? {vote_dual: voteDual} : {vote_model: voteModel};
  }
  async function poll(jid){
    setJobId(jid);
    while(!cancelledRef.current){
      await new Promise(r=>setTimeout(r,900));
      if(cancelledRef.current) return;
      const s=await jget("/api/evaluate/status/"+jid);
      if(s.error){ setBusy(false); setProg(null); setJobId(null); setMsg({ok:false,text:"Error: "+s.error}); return; }
      setProg(s.total? `${s.stage} (${s.scored}/${s.total})` : s.stage);
      if(s.done){
        setBusy(false); setProg(null); setJobId(null);
        if(s.error){ setMsg({ok:false,text:"Error: "+s.error}); }
        else {
          const res=s.result, ing=res._ingest;
          setMsg({ok:true, text:`Done — ${vendor}: ${res.vote.recommendation} (${fmt(res.weighted_total)}/100).`,
                  ingest: ing? `Ingested ${ing.files.length} file(s)${ing.urls.length?` + ${ing.urls.length} URL(s)`:""}, ${ing.chars_extracted.toLocaleString()} chars${ing.rejected.length?` · rejected: ${ing.rejected.join(", ")}`:""}.`:null});
          onDone();
        }
        return;
      }
    }
  }
  async function run(useSample){
    if(!vendor) return;
    cancelledRef.current = false;
    setBusy(true); setProg("Starting…");
    setMsg({ok:true, text:`Evaluating ${vendor}…`});
    if(STATIC){
      // Offline standalone build: no server to poll. Ignores scoring_model/voteMode (dual mode is intentionally inert here) and returns the precomputed result.
      const res=await jpost("/api/evaluate",{vendor}); setBusy(false); setProg(null);
      if(res.error) setMsg({ok:false,text:"Error: "+res.error});
      else { setMsg({ok:true,text:`${vendor}: ${res.vote.recommendation} (${fmt(res.weighted_total)}/100).`}); onDone(); }
      return;
    }
    let jid;
    if(useSample){
      const res=await jpost("/api/evaluate",{vendor,product:"",use_sample:true,scoring_model:model,...votePayload()});
      if(res.error){ setBusy(false); setProg(null); setMsg({ok:false,text:"Error: "+res.error}); return; }
      jid=res.job_id;
    } else {
      const fd=new FormData();
      fd.append("vendor",vendor); fd.append("scoring_model",model);
      if(voteMode==="dual") fd.append("vote_dual",JSON.stringify(voteDual)); else fd.append("vote_model",voteModel);
      fd.append("urls",urls); files.forEach(f=>fd.append("files",f));
      const r=await fetch("/api/evaluate_upload",{method:"POST",body:fd});
      const res=await r.json();
      if(res.error){ setBusy(false); setProg(null); setMsg({ok:false,text:"Error: "+res.error}); return; }
      jid=res.job_id;
    }
    poll(jid);
  }
  async function cancel(){
    cancelledRef.current = true;
    if(jobId) await jpost("/api/evaluate/cancel/"+jobId,{});
    setBusy(false); setProg(null); setJobId(null);
    setMsg({ok:true, text:"Evaluation cancelled."});
  }

  const isMock = model==="mock";
  const hasSources = files.length>0 || urls.trim().length>0;

  return (
    <div>
      <div className="runbar-controls" style={{marginBottom:hasSources||!STATIC?12:0}}>
        <b className="small" style={{color:"var(--ssa-blue)"}}>Evaluate a vendor</b>
        <select className="pill" style={{padding:"7px 10px"}} value={vendor} onChange={e=>setVendor(e.target.value)}>
          {vendors.map(v=>(<option key={v.name} value={v.name}>{v.name}</option>))}
        </select>
        {!STATIC && <>
          {/* hidden native input, triggered by a styled button */}
          <input ref={fileRef} type="file" multiple accept={ACCEPT} style={{display:"none"}}
                 onChange={e=>{addFiles(e.target.files); e.target.value="";}}/>
          <button className="btn ghost" onClick={()=>fileRef.current?.click()}>+ Upload proposal files</button>
          <button className="btn" onClick={()=>run(false)} disabled={busy || !hasSources}>
            Run on uploaded sources</button>
          <button className="btn ghost" onClick={()=>run(true)} disabled={busy}>Run on sample</button>
        </>}
        {STATIC && <button className="btn" onClick={()=>run(true)} disabled={busy}>Show evaluation</button>}
        {busy && !STATIC && <span className="small" style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="spin"/>{prog||"Working…"}
          <button className="btn ghost" onClick={cancel} style={{padding:"4px 10px"}}>Cancel</button>
        </span>}
      </div>

      {!STATIC && (
        <div className="grid source-grid"
             onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault(); addFiles(e.dataTransfer.files);}}>
          <div>
            <div className="small muted" style={{marginBottom:4}}>Accepted: PDF, DOCX, XLSX, TXT, MD — drag &amp; drop or use the button. Multiple files per vendor OK.</div>
            {files.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {files.map((f,i)=>(<span key={i} className="pill">{f.name} <span style={{cursor:"pointer",color:"var(--bad)"}} onClick={()=>removeFile(i)}>&#10005;</span></span>))}
            </div>}
          </div>
          <div>
            <div className="small muted" style={{marginBottom:4}}>…or paste vendor URL(s) — one per line (portal link, shared doc, hosted PDF).</div>
            <textarea value={urls} onChange={e=>setUrls(e.target.value)} rows={2}
              placeholder="https://vendor.com/our-response.pdf"
              style={{width:"100%",border:"1px solid var(--line)",borderRadius:8,padding:"8px 10px",fontFamily:"var(--font)",fontSize:13}}/>
          </div>
        </div>
      )}

      {isMock && !STATIC && hasSources && <div className="small" style={{color:"var(--warn)",marginTop:8}}>
        &#9888; A live model is recommended for real proposals — the offline "mock" engine doesn’t read uploaded content deeply. Pick a model (top-right).
      </div>}
      {msg && <div className="small" style={{marginTop:8,color: msg.ok?"var(--good)":"var(--bad)"}}>
        {msg.text}{msg.ingest && <div className="muted">{msg.ingest}</div>}</div>}
    </div>
  );
}

      setVendors((await jget("/api/vendors")).vendors||[]);
      setKb(await jget("/api/knowledge"));
      await loadResults();
      if(STATIC){ setLogo(BOOT.logo||""); }
      else { try{ const t=await (await fetch("/ssa_logo_long_white_b64.txt")).text(); setLogo(t.trim()); }catch(e){} }
    })();
  },[]);
  useEffect(()=>{
    if(results.length && !results.some(r=>r.vendor===open)) setOpen(results[0].vendor);
  },[results,open]);

  const openData = open ? results.find(r=>r.vendor===open) : null;
  const anyLive = models?.providers?.some(p=>p.key_present && p.id!=="mock");

  return (
    <div>
      <header className="app">
        <div className="bar">
          {logo ? <img src={logo} alt="SSA & Company"/> : <b style={{fontSize:18}}>SSA &amp; Company</b>}
          <div className="title">FSM RFP Evaluation Agent
            <small>Service Logic · Field Service Management platform selection</small></div>
          <div className="spacer"/>
          <ModelControls models={models} scoring={model} setScoring={setModel}
            voteMode={voteMode} setVoteMode={setVoteMode} voteModel={voteModel} setVoteModel={setVoteModel}
            voteDual={voteDual} setVoteDual={setVoteDual}/>
        </div>
      </header>

      <nav className="tabs"><div className="inner">
        {[["dashboard","Dashboard"],["detail","Vendor detail"],["method","Methodology & rubric"],["chat","Ask the agent"]].map(([k,l])=>(
          <button key={k} className={tab===k?"active":""} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div></nav>

      <div className="wrap" style={{paddingTop:18,paddingBottom:30}}>
        {!anyLive && <div className="demowarn">
          No live model API key detected — running the <b>offline demo engine</b>. Scores are deterministic and grounded in the research dossier (clearly labelled "demo"). Set <code>ANTHROPIC_API_KEY</code> or <code>OPENAI_API_KEY</code> and pick a model (top-right) for a live LLM read. Vendor proposals are due July 2; until then the app runs on synthetic sample proposals.
        </div>}

        <div className="card" style={{marginBottom:18}}>
          <RunBar vendors={vendors} model={model} voteMode={voteMode} voteModel={voteModel} voteDual={voteDual} onDone={loadResults}/>
        </div>

        {tab==="dashboard" && <Dashboard results={results} onOpen={(v)=>{setOpen(v);setTab("detail");}}/>}
        {tab==="detail" && (
          <div>
            <div className="vendor-pills">
              {results.map(r=>(
                <button key={r.vendor} className={"pill"} style={{cursor:"pointer",
                  borderColor: open===r.vendor?"var(--ssa-blue)":"var(--line)",
                  color: open===r.vendor?"var(--ssa-blue)":"var(--muted)",
                  fontWeight: open===r.vendor?600:400}}
                  onClick={()=>setOpen(r.vendor)}>{r.vendor}</button>
              ))}
            </div>
            {openData ? <VendorDetail data={openData}/> : <p className="muted">Pick a vendor above.</p>}
          </div>
        )}
        {tab==="method" && <Methodology kb={kb}/>}
        {tab==="chat" && <Chat model={model}/>}
      </div>

      <footer className="app">
        Prepared by SSA &amp; Company · Confidential &amp; Proprietary · FSM RFP Evaluation Agent (research preview).
        The agent casts an advisory vote to augment — not replace — the human evaluation committee.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
