<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FSM RFP Evaluation Agent — SSA &amp; Company</title>

<!-- React + Babel via CDN so the app runs with no build step. -->
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
  /* SSA brand tokens (from the SSA brand spec). */
  :root{
    --ssa-blue:#003399; --ssa-teal:#336179; --ssa-light:#B8CFFF;
    /* Cross-browser sticky offsets: adjust if your header/nav sizes change */
    --header-height: 0px; /* space above the sticky nav (e.g. banner) */
    --nav-tabs-height: 56px; /* height of the sticky nav.tabs (default) */
    --ink:#0f1b33; --muted:#5b6677; --line:#E0E4EA; --surface:#FAFBFC;
    --good:#1f7a4d; --warn:#D97706; --bad:#b3261e; --steel:#8BA4C4;
    --font:'Avenir Next LT Pro','Avenir','Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  /* Reserve the vertical-scrollbar gutter so a tall tab (e.g. Compare) whose height
     lands on the scrollbar threshold can't oscillate the scrollbar on/off — each toggle
     changes the width ~15px, rewraps the full-width takeaway/labels, re-crosses the
     threshold, and the page jitters. overflow-y:scroll guarantees it in every browser. */
  html{scrollbar-gutter:stable;overflow-y:scroll}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--surface);line-height:1.45}
  a{color:var(--ssa-blue)}
  .wrap{max-width:1440px;margin:0 auto;padding:0 30px}
  /* Header */
  header.app{background:linear-gradient(90deg,var(--ssa-blue),var(--ssa-teal));color:#fff}
  /* `bar` collides with the generic progress-bar rule below; reset its leaked props so the header gradient shows. */
  header.app .bar{display:flex;align-items:center;gap:18px;padding:18px 30px;max-width:1440px;margin:0 auto;background:transparent;height:auto;border-radius:0;overflow:visible}
  header.app img{height:34px}
  header.app .title{font-size:15px;font-weight:600;letter-spacing:.2px;opacity:.95;border-left:1px solid rgba(255,255,255,.35);padding-left:18px}
  header.app .title small{display:block;font-weight:400;opacity:.8;font-size:12px}
  header.app .spacer{flex:1}
  /* Model selector */
  .modelsel{display:flex;align-items:center;gap:8px;font-size:12px}
  .modelsel select{font-family:var(--font);font-size:12px;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.12);color:#fff}
  .modelsel select option{color:#000}
  .modelsel label{opacity:.85}
  .keypill{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,.18)}
  /* Nav */
  nav.tabs{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  nav.tabs .inner{display:flex;gap:4px;max-width:1440px;margin:0 auto;padding:0 30px;overflow-x:auto}
  nav.tabs button{background:none;border:none;padding:15px 18px;font-family:var(--font);font-size:14px;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
  nav.tabs button.active{color:var(--ssa-blue);border-bottom-color:var(--ssa-blue);font-weight:600}
  /* Cards & layout */
  .grid{display:grid;gap:22px}
  .card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:22px}
  .card h3{margin:0 0 6px;font-size:16px;line-height:1.25;color:var(--ssa-blue)}
  .card .sub{color:var(--muted);font-size:12px;margin-bottom:12px}
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:34px 0 12px;font-weight:600}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  /* Vote badges */
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .b-Recommend{background:#e4f3ea;color:var(--good)}
  .b-Shortlist{background:#fff2db;color:var(--warn)}
  .b-Reject,.b-Disqualified{background:#fae6e4;color:var(--bad)}
  /* Score ring */
  .ring{display:flex;align-items:center;gap:14px}
  .ring .num{font-size:30px;font-weight:700;color:var(--ssa-blue);line-height:1}
  .ring .den{font-size:13px;color:var(--muted)}
  .score-stack{display:grid;grid-template-columns:repeat(3,minmax(150px,1fr));gap:14px;margin-top:12px}
  .score-tile{border:1px solid var(--line);border-radius:8px;padding:14px 16px;min-height:88px;display:flex;flex-direction:column;justify-content:center}
  .score-tile .num{font-size:32px;font-weight:700;color:var(--ssa-blue);line-height:1}
  .score-tile .den{font-size:12.5px;color:var(--muted);margin-top:5px}
  /* Bars */
  .bar{height:9px;background:#eef1f6;border-radius:6px;overflow:hidden}
  .bar > span{display:block;height:100%;background:linear-gradient(90deg,var(--ssa-blue),var(--ssa-teal))}
  .rowbar{display:grid;grid-template-columns:minmax(180px,240px) 1fr 64px;gap:14px;align-items:center;margin:10px 0;font-size:13px;line-height:1.25}
  .rowbar .lbl{color:var(--ink)}
  .rowbar .val{text-align:right;font-variant-numeric:tabular-nums;color:var(--muted)}
  /* Table */
  table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.35}
      th{color:var(--muted);font-weight:600;cursor:pointer;user-select:none;background:#fff}
  .table-scroll{overflow:auto}
  .dashboard-table{min-width:920px}
  .requirement-table{min-width:980px}
  .requirement-table th{position:sticky;top:0;z-index:10;-webkit-backface-visibility:hidden;backface-visibility:hidden;transform:translateZ(0)}
  .requirement-table-wrap{max-height:560px;border:1px solid var(--line);border-radius:8px}
  td.code{font-weight:600}
  .tag{font-size:10px;padding:1px 6px;border-radius:4px;background:#eef1f6;color:var(--muted)}
  .met-Yes{color:var(--good);font-weight:600}.met-Partial{color:var(--warn);font-weight:600}
  .met-No{color:var(--bad);font-weight:600}.met-NA{color:var(--steel)}
  .conf-Low{color:var(--bad)}.conf-Medium{color:var(--warn)}.conf-High{color:var(--good)}
  /* Buttons */
  .btn{background:var(--ssa-blue);color:#fff;border:none;border-radius:7px;padding:9px 16px;font-family:var(--font);font-size:13px;cursor:pointer}
  .btn:hover{background:#00257a}
  .btn.ghost{background:#fff;color:var(--ssa-blue);border:1px solid var(--ssa-blue)}
  .btn:disabled{opacity:.5;cursor:default}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid var(--line);color:var(--muted)}
  /* Chat */
  .chat{display:flex;flex-direction:column;height:calc(100vh - 230px);min-height:420px}
  .chat .log{flex:1;overflow-y:auto;padding:6px 2px}
  .msg{margin:10px 0;max-width:85%;padding:11px 14px;border-radius:12px;font-size:13.5px;white-space:pre-wrap;line-height:1.5}
  .msg.user{margin-left:auto;background:var(--ssa-blue);color:#fff;border-bottom-right-radius:3px}
  .msg.bot{background:#fff;border:1px solid var(--line);border-bottom-left-radius:3px}
  .msg .ground{margin-top:8px;font-size:10.5px;color:var(--muted)}
  .chat .inputrow{display:flex;gap:8px;margin-top:12px}
  .chat input{flex:1;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-family:var(--font);font-size:14px}
  /* Footer */
  footer.app{padding:24px 22px;color:var(--muted);font-size:11.5px;text-align:center;border-top:1px solid var(--line);margin-top:30px}
  .demowarn{background:#fff7e6;border:1px solid #f0d9a8;color:#8a5a00;font-size:12px;padding:8px 12px;border-radius:8px;margin:14px 0}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--ssa-light);border-top-color:var(--ssa-blue);border-radius:50%;animation:sp .8s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  .kpi{display:flex;gap:18px 28px;flex-wrap:wrap}
  .kpi .k{font-size:12px;color:var(--muted)}.kpi .k b{display:block;font-size:20px;color:var(--ink)}
  .detail-hero{grid-template-columns:minmax(0,1.35fr) minmax(340px,.85fr);align-items:stretch}
  .detail-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .vote-columns{grid-template-columns:repeat(2,minmax(0,1fr));margin-top:12px}
  .vendor-pills{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
  .requirement-controls{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .cmp-pickers{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .cmp-pickers label{display:flex;align-items:center}
  .cmp-takeaway{background:#eef3fb;border:1px solid #c9d9ed;border-radius:8px;padding:14px 16px;font-size:14px;line-height:1.5;margin-bottom:8px}
  .cmp-colhead,.cmp-metric{display:grid;grid-template-columns:minmax(160px,1.4fr) 1fr 64px 1fr;gap:12px;align-items:center}
  .cmp-colhead{margin:6px 0 2px;padding:0 22px}
  .cmp-vendorhead{text-align:left}
  .cmp-metric{font-size:13px;margin:9px 0}
  .cmp-metric-label{color:var(--ink);line-height:1.25}
  .cmp-side{display:flex;align-items:center;gap:10px}
  .cmp-side .bar{flex:1}
  .cmp-num{font-variant-numeric:tabular-nums;color:var(--muted);min-width:34px;text-align:right}
  .cmp-delta{text-align:center;font-size:12px;font-variant-numeric:tabular-nums}
  .delta-up{color:var(--good);font-weight:600}
  .delta-down{color:var(--bad);font-weight:600}
  .delta-zero{color:var(--muted)}
  @media (max-width:1080px){ .cmp-colhead,.cmp-metric{grid-template-columns:minmax(120px,1fr) 1fr 52px 1fr} }
  .runbar-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .source-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;align-items:start}
  .research-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px 24px}
  .heatmap-card{padding:18px;overflow:auto}
  .heatmap{display:grid;gap:8px}
  .heatmap-row{display:grid;gap:8px;align-items:stretch}
  .heatmap-head{font-size:11px;text-transform:uppercase;letter-spacing:.45px;color:var(--muted);align-items:end}
  .heatmap-vendor{border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:#fff}
  .heatmap-vendor b{display:block;color:var(--ink)}
  .heatmap-vendor span{font-size:11.5px;color:var(--muted)}
  .heatcell{border:1px solid var(--line);border-radius:8px;padding:9px 8px;min-height:64px;display:flex;flex-direction:column;justify-content:space-between}
  .heatcell span{font-size:11px;color:var(--muted)}
  .heatcell strong{font-size:18px;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
  .heatcell small{font-size:10.5px;color:var(--muted)}
  .heat-high{background:#e6f3ec;border-color:#bddcc9}
  .heat-mid{background:#edf3fb;border-color:#c9d9ed}
  .heat-warn{background:#fff5df;border-color:#edd6a8}
  .heat-low{background:#fae8e6;border-color:#ecc2bd}
  @media (max-width: 1080px){
    .detail-hero,.detail-grid,.vote-columns,.source-grid,.research-grid{grid-template-columns:1fr!important}
    .score-stack{grid-template-columns:repeat(3,minmax(0,1fr))}
    .rowbar{grid-template-columns:minmax(150px,220px) 1fr 58px}
  }
  @media (max-width: 720px){
    .wrap,header.app .bar,nav.tabs .inner{padding-left:18px;padding-right:18px}
    header.app .bar{align-items:flex-start;flex-direction:column}
    header.app .title{border-left:0;padding-left:0}
    header.app .spacer{display:none}
    .score-stack{grid-template-columns:1fr}
    .rowbar{grid-template-columns:1fr;gap:6px}
    .rowbar .val{text-align:left}
    .card{padding:18px}
  }
  .requirement-table details.evidence{margin-top:4px}
  .requirement-table details.evidence>summary{cursor:pointer;color:var(--ssa-blue);font-size:12px}
  .requirement-table details.evidence blockquote{margin:4px 0;padding:4px 8px;border-left:3px solid var(--ssa-blue);background:rgba(0,0,0,.03);font-style:italic;font-size:12px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState, useEffect, useMemo, useRef} = React;
const API = ""; // same origin (Flask serves this file)

// STATIC mode: when a build inlines window.__BOOT__, the app runs with no backend
// (great for a double-clickable, server-free demo). Live evaluate/chat then fall back
// to the offline demo behaviour client-side.
const BOOT = (typeof window!=="undefined" && window.__BOOT__) ? window.__BOOT__ : null;
const STATIC = !!BOOT;

// ---- helpers -------------------------------------------------------------
const fmt = n => (n===undefined||n===null) ? "—" : (Math.round(n*10)/10);
const scoreTone = n => n>=4 ? "heat-high" : n>=3.25 ? "heat-mid" : n>=2.5 ? "heat-warn" : "heat-low";
async function jget(u){
  if(STATIC){
    if(u.endsWith("/models")) return BOOT.models;
    if(u.endsWith("/results")) return BOOT.results;
    if(u.endsWith("/vendors")) return {vendors:BOOT.vendors};
    if(u.endsWith("/knowledge")) return BOOT.knowledge;
    if(u.endsWith("/health")) return {ok:true,live_models_available:false,n_results:BOOT.results.length};
    return {};
  }
  const r=await fetch(API+u);return r.json();
}
async function jpost(u,b){
  if(STATIC){
    if(u.endsWith("/chat")) return {answer:"[standalone demo] This double-clickable build has no backend, so it can't call a model. Run the Flask server (see README) and select a model to get synthesized answers. The grounded knowledge base and all precomputed results are fully browsable here.",grounding:["scorecard","capabilities","evaluations"],is_demo:true};
    if(u.endsWith("/evaluate")){ const r=BOOT.results.find(x=>x.vendor===b.vendor); return r||{error:"Run the server to evaluate new vendors."}; }
    return {};
  }
  const r=await fetch(API+u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});return r.json();
}
const recoClass = r => "badge b-"+(r||"").replace(/[^A-Za-z]/g,"");

// ---- score bar row -------------------------------------------------------
function BarRow({label, value, max=5, suffix="/5"}){
  const pct = Math.max(0, Math.min(100, (value/max)*100));
  return (
    <div className="rowbar">
      <div className="lbl">{label}</div>
      <div className="bar"><span style={{width:pct+"%"}}/></div>
      <div className="val">{fmt(value)}{suffix}</div>
    </div>
  );
}

// ---- compare: deterministic helpers ------------------------------------
// Pure, self-contained (no outer-scope refs) so a Node harness can extract
// the block between the markers and exercise the ACTUAL shipped logic.
// === COMPARE_HELPERS_START ===
const _cr1 = n => (n===undefined||n===null) ? 0 : Math.round(n*10)/10;
const _plural = n => n===1 ? "" : "s";

// Count, over the 8 RFP capabilities, where each side leads (epsilon tie).
function cmpCapabilityLead(a, b, eps){
  eps = (eps===undefined) ? 0.05 : eps;
  const bMap = {}; (b.capabilities||[]).forEach(c => { bMap[c.code] = c; });
  let aLeads=0, bLeads=0, ties=0;
  (a.capabilities||[]).forEach(ca => {
    const cb = bMap[ca.code]; if(!cb) return;
    const d = ca.score_1_5 - cb.score_1_5;
    if(Math.abs(d) <= eps) ties++;
    else if(d > 0) aLeads++; else bLeads++;
  });
  return {aLeads, bLeads, ties};
}

// Requirement-level divergence. Must-met = priority Must AND met === "Yes".
// Quality counts exclude rows where either side is N/A or quality 0.
function cmpReqDivergence(a, b){
  const bMap = {}; (b.requirement_scores||[]).forEach(x => { bMap[x.rid] = x; });
  let mustAOnly=0, mustBOnly=0, aHigher=0, tie=0, bHigher=0;
  const deltas = [];
  (a.requirement_scores||[]).forEach(xa => {
    const xb = bMap[xa.rid]; if(!xb) return;
    if(xa.priority === "Must"){
      const aMet = xa.met === "Yes", bMet = xb.met === "Yes";
      if(aMet && !bMet) mustAOnly++;
      else if(bMet && !aMet) mustBOnly++;
    }
    const qOk = xa.quality>0 && xb.quality>0 && xa.met!=="N/A" && xb.met!=="N/A";
    if(qOk){
      const d = xa.quality - xb.quality;
      if(d>0) aHigher++; else if(d<0) bHigher++; else tie++;
      if(d!==0) deltas.push({rid:xa.rid, domain:xa.domain, priority:xa.priority, a:xa.quality, b:xb.quality, delta:d});
    }
  });
  deltas.sort((p,q) => Math.abs(q.delta) - Math.abs(p.delta));
  return {mustAOnly, mustBOnly, aHigher, tie, bHigher, topDeltas:deltas.slice(0,5), total:deltas.length};
}

// One-sentence deterministic verdict. Gating divergence leads; else headline
// lenses (with a 1-point tie band); else capability count breaks a tie.
function cmpTakeaway(a, b){
  const aDQ = !!(a.gating && a.gating.disqualified);
  const bDQ = !!(b.gating && b.gating.disqualified);
  const aMust = a.gating ? a.gating.unmet_must_count : 0;
  const bMust = b.gating ? b.gating.unmet_must_count : 0;
  if(aDQ && !bDQ) return `${b.vendor} is the standing option — ${a.vendor} is disqualified (${aMust} unmet Must${_plural(aMust)}).`;
  if(bDQ && !aDQ) return `${a.vendor} is the standing option — ${b.vendor} is disqualified (${bMust} unmet Must${_plural(bMust)}).`;
  if(aDQ && bDQ) return `Both ${a.vendor} and ${b.vendor} are disqualified (${aMust} vs ${bMust} unmet Musts) — neither passes the Must gate.`;
  const cap = cmpCapabilityLead(a, b);
  const ssaD = a.weighted_total - b.weighted_total;
  const c30D = a.capability_weighted_total - b.capability_weighted_total;
  const lens = `SSA ${_cr1(a.weighted_total)} vs ${_cr1(b.weighted_total)}, §30 ${_cr1(a.capability_weighted_total)} vs ${_cr1(b.capability_weighted_total)}`;
  const near = Math.abs(ssaD) <= 1 && Math.abs(c30D) <= 1;
  const split = (ssaD > 0) !== (c30D > 0);
  if(near || split){
    const capLeader = cap.aLeads > cap.bLeads ? a.vendor : cap.bLeads > cap.aLeads ? b.vendor : null;
    const capPhrase = capLeader ? `${capLeader} leads on ${Math.max(cap.aLeads, cap.bLeads)} of 8 capabilities` : `capabilities are split evenly`;
    return `Evenly matched on headline scores (${lens}); ${capPhrase}.`;
  }
  const leader = ssaD > 0 ? a : b;
  const ahead = ssaD > 0 ? cap.aLeads : cap.bLeads;
  return `${leader.vendor} leads — higher on both lenses (${lens}) and ahead on ${ahead} of 8 capabilities.`;
}
// === COMPARE_HELPERS_END ===

function CapabilityHeatmap({results}){
  const caps = results[0]?.capabilities || [];
  if(!caps.length) return null;
  const columns = `minmax(180px,1.2fr) repeat(${caps.length}, minmax(74px,1fr))`;
  return (
    <div className="card heatmap-card">
      <div className="heatmap">
        <div className="heatmap-row heatmap-head" style={{gridTemplateColumns:columns}}>
          <div>Vendor</div>
          {caps.map(c=><div key={c.code}>{c.code}</div>)}
        </div>
        {results.map(r=>(
          <div className="heatmap-row" style={{gridTemplateColumns:columns}} key={r.vendor}>
            <div className="heatmap-vendor">
              <b>{r.vendor}</b>
              <span>{r.vote.recommendation} · {fmt(r.weighted_total)}/100</span>
            </div>
            {caps.map(cap=>{
              const c = r.capabilities.find(x=>x.code===cap.code) || {};
              return (
                <div key={cap.code} className={"heatcell "+scoreTone(c.score_1_5 || 0)}
                     title={`${cap.name}: ${fmt(c.score_1_5)}/5`}>
                  <span>{cap.code}</span>
                  <strong>{fmt(c.score_1_5)}</strong>
                  <small>{c.n_unmet_must ? `${c.n_unmet_must} unmet Must` : "/5"}</small>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

// ---- model controls (header) --------------------------------------------
function Picker({models,value,onChange,title}){
  return (
    <select title={title||""} value={value} onChange={e=>onChange(e.target.value)}
            style={{fontFamily:"var(--font)",fontSize:12,padding:"6px 8px",borderRadius:6,
                    border:"1px solid rgba(255,255,255,.4)",background:"rgba(255,255,255,.12)",color:"#fff"}}>
      {models.providers.map(p=>(
        <optgroup key={p.id} label={p.name+(p.key_present?"":" (no key)")}>
          {p.models.map(m=>(<option key={m.id} value={m.id} disabled={!p.key_present && p.id!=="mock"}
             style={{color:"#000"}}>{m.label}{!p.key_present&&p.id!=="mock"?" — key missing":""}</option>))}
        </optgroup>
      ))}
    </select>
  );
}
function ModelControls({models, scoring, setScoring, voteMode, setVoteMode, voteModel, setVoteModel, voteDual, setVoteDual}){
  if(!models) return null;
  return (
    <div className="modelsel" style={{gap:12,flexWrap:"wrap"}}>
      <span style={{display:"flex",alignItems:"center",gap:6}}>
        <label>Scoring</label><Picker models={models} value={scoring} onChange={setScoring}/>
      </span>
      <span style={{display:"flex",alignItems:"center",gap:6}}>
        <label>Vote</label>
        <select value={voteMode} onChange={e=>setVoteMode(e.target.value)}
                style={{fontSize:12,padding:"6px 8px",borderRadius:6,border:"1px solid rgba(255,255,255,.4)",background:"rgba(255,255,255,.12)",color:"#fff"}}>
          <option value="single" style={{color:"#000"}}>Single model</option>
          <option value="dual" style={{color:"#000"}}>Dual (two-model read)</option>
        </select>
      </span>

// ---- compare helpers -------------------------------------------------------
// delta = A - B; arrow + sign carry meaning (colorblind-safe), color secondary.
function DeltaChip({delta, digits=1}){
  const p = Math.pow(10, digits);
  const d = Math.round((delta||0) * p) / p;
  if(d > 0) return <span className="delta-up" title="Vendor A higher">{"▲"} +{d}</span>;
  if(d < 0) return <span className="delta-down" title="Vendor B higher">{"▼"} {d}</span>;
  return <span className="delta-zero" title="tie">{"–"} 0</span>;
}

// One paired metric row: label | A value | delta | B value, with mini bars.
function CmpRow({label, a, b, max=5, sub}){
  const pa = Math.max(0, Math.min(100, (a/max)*100));
  const pb = Math.max(0, Math.min(100, (b/max)*100));
  return (
    <div className="cmp-metric">
      <div className="cmp-metric-label">{label}{sub && <div className="small muted">{sub}</div>}</div>
      <div className="cmp-side">
        <div className="bar"><span style={{width:pa+"%"}}/></div>
        <span className="cmp-num">{fmt(a)}</span>
      </div>
      <div className="cmp-delta"><DeltaChip delta={a-b}/></div>
      <div className="cmp-side">
        <div className="bar"><span style={{width:pb+"%"}}/></div>
        <span className="cmp-num">{fmt(b)}</span>
      </div>
    </div>
  );
}

// ---- compare (two vendors side by side) ----------------------------------
function Compare({results}){
  const names = results.map(r => r.vendor);
  const [aName, setAName] = useState(null);
  const [bName, setBName] = useState(null);
  const [showTable, setShowTable] = useState(false);
  const [onlyDiff, setOnlyDiff] = useState(true);
  const [prio, setPrio] = useState("ALL");

  useEffect(() => {
    if(results.length < 2) return;
    const ranked = [...results].sort((x,y) => y.weighted_total - x.weighted_total);
    setAName(prev => (prev && names.includes(prev)) ? prev : ranked[0].vendor);
    setBName(prev => (prev && names.includes(prev) && prev!==ranked[0].vendor) ? prev : ranked[1].vendor);
  }, [results]);

  if(results.length < 2){
    return <p className="muted">Need at least two evaluated vendors to compare. Run another evaluation above.</p>;
  }

  let bSafe = bName;
  if(bSafe === aName) bSafe = names.find(n => n !== aName) || bName;
  const A = results.find(r => r.vendor === aName);
  const B = results.find(r => r.vendor === bSafe);
  if(!A || !B) return <p className="muted">Pick two vendors to compare.</p>;

  const REQUIRED = ["gating","categories","capabilities","segment_fit","agentic_future","vote","requirement_scores"];
  const missing = REQUIRED.find(k => !A[k] || !B[k]);
  if(missing) return <p className="muted">One of these evaluations is missing data ({missing}); re-run it before comparing.</p>;

  const div = cmpReqDivergence(A, B);
  const bReq = {}; B.requirement_scores.forEach(x => { bReq[x.rid] = x; });
  const mergedRows = A.requirement_scores.map(xa => {
    const xb = bReq[xa.rid] || {};
    const qa = xa.quality || 0, qb = (xb.quality || 0);
    const hasB = bReq[xa.rid] !== undefined;
    return {rid:xa.rid, domain:xa.domain, priority:xa.priority,
            a:qa, b:hasB ? qb : null, met_a:xa.met, met_b:hasB ? xb.met : "—",
            delta: hasB ? (qa - qb) : 0,
            differ: !hasB || qa !== qb || xa.met !== xb.met};
  });
  const visibleRows = mergedRows.filter(r =>
    (prio === "ALL" || r.priority === prio) && (!onlyDiff || r.differ));

  return (
    <div>
      <div className="cmp-pickers">
        <label className="small muted">Vendor A
          <select className="pill" style={{padding:"5px 8px",marginLeft:6}} value={aName} onChange={e=>setAName(e.target.value)}>
            {names.map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </label>
        <span className="muted">vs</span>
        <label className="small muted">Vendor B
          <select className="pill" style={{padding:"5px 8px",marginLeft:6}} value={bSafe} onChange={e=>setBName(e.target.value)}>
            {names.map(n => <option key={n} value={n}>{n}</option>)}
          </select>
        </label>
        {bName === aName && <span className="small" style={{color:"var(--warn)"}}>Pick two different vendors — showing the next one.</span>}
      </div>

      <div className="cmp-takeaway">{cmpTakeaway(A, B)}</div>

      {/* Column headers */}
      <div className="cmp-colhead">
        <div></div>
        <div className="cmp-vendorhead"><b>{A.vendor}</b><div className="small muted">{A.product}{A.is_demo && <span className="tag" style={{marginLeft:6}}>demo</span>}</div></div>
        <div></div>
        <div className="cmp-vendorhead"><b>{B.vendor}</b><div className="small muted">{B.product}{B.is_demo && <span className="tag" style={{marginLeft:6}}>demo</span>}</div></div>
      </div>

      {/* Headline lenses */}
      <div className="section-title">Headline scores</div>
      <div className="card">
        <CmpRow label="SSA weighted total" a={A.weighted_total} b={B.weighted_total} max={100}/>
        <CmpRow label={"RFP §30 capability lens"} a={A.capability_weighted_total} b={B.capability_weighted_total} max={100}/>
      </div>

      {/* Gating */}
      <div className="section-title">Gate (MoSCoW + architectural)</div>
      <div className="grid detail-grid">
        {[A,B].map((r,i)=>(
          <div className="card" key={i}>
            <b>{r.vendor}: {r.gating.disqualified ? <span className="met-No">DISQUALIFIED</span> : <span className="met-Yes">PASS</span>}</b>
            <p className="small muted" style={{marginTop:4}}>{r.gating.summary}</p>
            {r.gating.unmet_musts.length>0 && <ul className="small" style={{margin:"6px 0 0 16px",padding:0}}>
              {r.gating.unmet_musts.slice(0,6).map(m=>(<li key={m.rid}>{m.rid} ({m.capability}): {m.reason}</li>))}
            </ul>}
            {r.gating.architectural_gate_flags.map((f,j)=>(<div key={j} className="small" style={{color:"var(--warn)",marginTop:6}}>{"⚑"} {f}</div>))}
          </div>
        ))}
      </div>

      {/* §30 capabilities */}
      <div className="section-title">{"RFP capabilities (Section 30)"}</div>
      <div className="card">
        {A.capabilities.map(ca=>{
          const cb = B.capabilities.find(x=>x.code===ca.code) || {score_1_5:0,n_unmet_must:0};
          return <CmpRow key={ca.code} label={`${ca.code} · ${ca.name}`}
                   sub={((ca.n_unmet_must ?? 0)>0||(cb.n_unmet_must ?? 0)>0) ? `unmet Must — ${A.vendor}: ${ca.n_unmet_must ?? 0}, ${B.vendor}: ${cb.n_unmet_must ?? 0}` : null}
                   a={ca.score_1_5} b={cb.score_1_5}/>;
        })}
      </div>

      {/* SSA categories */}
      <div className="section-title">SSA scorecard categories</div>
      <div className="card">
        {A.categories.map(ca=>{
          const cb = B.categories.find(x=>x.id===ca.id) || {raw_1_5:0};
          return <CmpRow key={ca.id} label={`${ca.name} (${Math.round(ca.weight*100)}%)`} a={ca.raw_1_5} b={cb.raw_1_5}/>;
        })}
      </div>

      {/* Segment fit */}
      <div className="section-title">OpCo-segment fit</div>
      <div className="card">
        {A.segment_fit.map(sa=>{
          const sb = B.segment_fit.find(x=>x.segment_id===sa.segment_id) || {fit_1_5:0};
          return <CmpRow key={sa.segment_id} label={sa.segment_name} a={sa.fit_1_5} b={sb.fit_1_5}/>;
        })}
      </div>

      {/* Agentic future */}
      <div className="section-title">Fit into an agentic future</div>
      <div className="card">
        <CmpRow label="Overall" a={A.agentic_future.score_1_5} b={B.agentic_future.score_1_5}/>
        <CmpRow label="Openness / data access" a={A.agentic_future.openness_1_5} b={B.agentic_future.openness_1_5}/>
        <CmpRow label="AI capability (shipped)" a={A.agentic_future.ai_capability_1_5} b={B.agentic_future.ai_capability_1_5}/>
        <div className="cmp-metric">
          <div className="cmp-metric-label">Data-control risk</div>
          <div className="cmp-side"><span className="cmp-num">{A.agentic_future.data_control_risk}</span></div>
          <div className="cmp-delta"></div>
          <div className="cmp-side"><span className="cmp-num">{B.agentic_future.data_control_risk}</span></div>
        </div>
      </div>

      {/* Vote */}
      <div className="section-title">{"The agent's vote"}</div>
      <div className="grid detail-grid">
        {[A,B].map((r,i)=>(
          <div className="card" key={i}>
            <b>{r.vendor}</b> <span className={recoClass(r.vote.recommendation)}>{r.vote.recommendation}</span>
            <span className="small muted"> · {r.vote.confidence} confidence</span>
            <details style={{marginTop:8}}>
              <summary className="small" style={{cursor:"pointer",color:"var(--ssa-blue)"}}>Narrative</summary>
              <p className="small" style={{marginTop:6}}>{r.vote.narrative}</p>
              {r.vote.dissent && <p className="small muted" style={{marginTop:6}}><b>Dissent:</b> {r.vote.dissent}</p>}
            </details>
          </div>
        ))}
      </div>

      {/* Requirement-level divergence */}
      <div className="section-title">Requirement divergence (422 requirements)</div>
      <div className="card">
        <div className="kpi" style={{marginBottom:6}}>
          <div className="k">Musts met by {A.vendor} only<b>{div.mustAOnly}</b></div>
          <div className="k">Musts met by {B.vendor} only<b>{div.mustBOnly}</b></div>
          <div className="k">{A.vendor} higher quality<b>{div.aHigher}</b></div>
          <div className="k">Tie<b>{div.tie}</b></div>
          <div className="k">{B.vendor} higher quality<b>{div.bHigher}</b></div>
        </div>
        {div.topDeltas.length>0 && <div className="small" style={{marginTop:8}}>
          <b>Biggest quality gaps</b>
          <ul style={{margin:"6px 0 0 16px",padding:0}}>
            {div.topDeltas.map(d=>(<li key={d.rid}>{d.rid} ({d.priority}): {A.vendor} {d.a} vs {B.vendor} {d.b} <DeltaChip delta={d.delta}/></li>))}
          </ul>
        </div>}
        <div className="requirement-controls" style={{marginTop:12}}>
          <button className="btn ghost small" onClick={()=>setShowTable(s=>!s)}>{showTable ? "Hide" : "Show"} full diff table</button>
          {showTable && <React.Fragment>
            <label className="small muted" style={{display:"flex",alignItems:"center",gap:6}}>
              <input type="checkbox" checked={onlyDiff} onChange={e=>setOnlyDiff(e.target.checked)}/> only where they differ
            </label>
            <select className="pill" style={{padding:"5px 8px"}} value={prio} onChange={e=>setPrio(e.target.value)}>
              <option value="ALL">All priorities</option>
              <option value="Must">Must</option><option value="Should">Should</option>
              <option value="Could">Could</option><option value="Won't">Won't</option>
            </select>
            <span className="muted small" style={{alignSelf:"center"}}>showing {visibleRows.length} of {mergedRows.filter(r => prio==="ALL" || r.priority===prio).length}</span>
          </React.Fragment>}
        </div>
        {showTable && <div className="table-scroll requirement-table-wrap">
          <table className="requirement-table">
            <thead><tr>
              <th>RID</th><th>Domain</th><th>Priority</th>
              <th>{A.vendor}</th><th>{B.vendor}</th><th>{"Δ"}</th>
            </tr></thead>
            <tbody>
            {visibleRows.map(r=>(
              <tr key={r.rid}>
                <td className="code">{r.rid}</td>
                <td className="small">{r.domain}</td>
                <td>{r.priority}</td>
                {/* A is the join base (mergedRows iterates A.requirement_scores); B may be missing -> "—" */}
                <td>{r.a || "—"} <span className={"met-"+String(r.met_a||"").replace("/","")} style={{fontSize:11}}>{r.met_a}</span></td>
                <td>{r.b===null ? "—" : (r.b || "—")} <span className={"met-"+String(r.met_b).replace("/","")} style={{fontSize:11}}>{r.met_b}</span></td>
                <td>{r.b===null ? "—" : <DeltaChip delta={r.delta}/>}</td>
              </tr>
            ))}
            </tbody>
          </table>
        </div>}
      </div>
    </div>
  );
}

// ---- chat ----------------------------------------------------------------
function Chat({model}){
  const [log,setLog]=useState([{role:"bot",content:"Ask me anything about the evaluation — why a vendor scored as it did, how the Must gate works, which platform fits the small low-maturity OpCos, the agentic-future read, etc. I answer grounded in the knowledge base and this session’s results."}]);
  const [q,setQ]=useState(""); const [busy,setBusy]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[log,busy]);
  async function send(){
    if(!q.trim()||busy) return;
    const question=q.trim(); setQ("");
    const hist=log.filter(m=>m.role!=="sys").map(m=>({role:m.role==="bot"?"assistant":"user",content:m.content}));
    setLog(l=>[...l,{role:"user",content:question}]); setBusy(true);
    const res=await jpost("/api/chat",{question,model_id:model,history:hist});
    setLog(l=>[...l,{role:"bot",content:res.answer,ground:res.grounding,demo:res.is_demo}]); setBusy(false);
  }
  const examples=["Why is Salesforce disqualified?","Which platform fits the small low-maturity OpCos best?","How does the Must gate work?","Give me the agentic-future read on ServiceTitan."];
  return (
    <div className="chat">
      <div className="log">
        {log.map((m,i)=>(
          <div key={i} className={"msg "+(m.role==="user"?"user":"bot")}>
            {m.content}
            {m.ground && <div className="ground">grounded in: {m.ground.join(", ")}{m.demo?" · demo (no model key)":""}</div>}
          </div>
        ))}
        {busy && <div className="msg bot"><span className="spin"></span> thinking…</div>}
        <div ref={endRef}/>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
        {examples.map((e,i)=>(<button key={i} className="pill" style={{cursor:"pointer"}} onClick={()=>setQ(e)}>{e}</button>))}
      </div>
      <div className="inputrow">
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()}
               placeholder="Ask the evaluation agent…"/>
        <button className="btn" onClick={send} disabled={busy}>Send</button>
      </div>
    </div>
  );
}

// ---- run-evaluation control: upload files + URLs, or use sample ----------
function RunBar({vendors, model, voteMode, voteModel, voteDual, onDone}){
  const [vendor,setVendor]=useState("");
  const [files,setFiles]=useState([]);          // File[]
  const [urls,setUrls]=useState("");            // newline/comma separated
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);            // {ok, text, ingest?}
  const [prog,setProg]=useState(null);
  const [jobId,setJobId]=useState(null);
  const cancelledRef=useRef(false);
  const fileRef=useRef(null);
  useEffect(()=>{ if(vendors.length && !vendor) setVendor(vendors[0].name); },[vendors]);

  const ACCEPT=".pdf,.docx,.xlsx,.xlsm,.txt,.md";
  function addFiles(list){ setFiles(f=>[...f, ...Array.from(list)]); }
  function removeFile(i){ setFiles(f=>f.filter((_,j)=>j!==i)); }

  function votePayload(){
    return voteMode==="dual" ? {vote_dual: voteDual} : {vote_model: voteModel};
  }
  async function poll(jid){
    setJobId(jid);
    while(!cancelledRef.current){
      await new Promise(r=>setTimeout(r,900));
      if(cancelledRef.current) return;
      const s=await jget("/api/evaluate/status/"+jid);
      if(s.error){ setBusy(false); setProg(null); setJobId(null); setMsg({ok:false,text:"Error: "+s.error}); return; }
      setProg(s.total? `${s.stage} (${s.scored}/${s.total})` : s.stage);
      if(s.done){
        setBusy(false); setProg(null); setJobId(null);
        if(s.error){ setMsg({ok:false,text:"Error: "+s.error}); }
        else {
          const res=s.result, ing=res._ingest;
          setMsg({ok:true, text:`Done — ${vendor}: ${res.vote.recommendation} (${fmt(res.weighted_total)}/100).`,
                  ingest: ing? `Ingested ${ing.files.length} file(s)${ing.urls.length?` + ${ing.urls.length} URL(s)`:""}, ${ing.chars_extracted.toLocaleString()} chars${ing.rejected.length?` · rejected: ${ing.rejected.join(", ")}`:""}.`:null});
          onDone();
        }
        return;
      }
    }
  }
  async function run(useSample){
    if(!vendor) return;
    cancelledRef.current = false;
    setBusy(true); setProg("Starting…");
    setMsg({ok:true, text:`Evaluating ${vendor}…`});
    if(STATIC){
      // Offline standalone build: no server to poll. Ignores scoring_model/voteMode (dual mode is intentionally inert here) and returns the precomputed result.
      const res=await jpost("/api/evaluate",{vendor}); setBusy(false); setProg(null);
      if(res.error) setMsg({ok:false,text:"Error: "+res.error});
      else { setMsg({ok:true,text:`${vendor}: ${res.vote.recommendation} (${fmt(res.weighted_total)}/100).`}); onDone(); }
      return;
    }
    let jid;
    if(useSample){
      const res=await jpost("/api/evaluate",{vendor,product:"",use_sample:true,scoring_model:model,...votePayload()});
      if(res.error){ setBusy(false); setProg(null); setMsg({ok:false,text:"Error: "+res.error}); return; }
      jid=res.job_id;
    } else {
      const fd=new FormData();
      fd.append("vendor",vendor); fd.append("scoring_model",model);
      if(voteMode==="dual") fd.append("vote_dual",JSON.stringify(voteDual)); else fd.append("vote_model",voteModel);
      fd.append("urls",urls); files.forEach(f=>fd.append("files",f));
      let res;
      try {
        const r=await fetch("/api/evaluate_upload",{method:"POST",body:fd});
        res=await r.json();  // a 413/oversized upload may return non-JSON; the catch keeps the spinner from hanging
      } catch(e) {
        setBusy(false); setProg(null);
        setMsg({ok:false,text:"Upload failed - the files may exceed the size limit, or the server is unreachable."});
        return;
      }
      if(res.error){ setBusy(false); setProg(null); setMsg({ok:false,text:"Error: "+res.error}); return; }
      jid=res.job_id;
    }
    poll(jid);
  }
  async function cancel(){
    cancelledRef.current = true;
    if(jobId) await jpost("/api/evaluate/cancel/"+jobId,{});
    setBusy(false); setProg(null); setJobId(null);
    setMsg({ok:true, text:"Evaluation cancelled."});
  }

  const isMock = model==="mock";
  const hasSources = files.length>0 || urls.trim().length>0;

  return (
    <div>
      <div className="runbar-controls" style={{marginBottom:hasSources||!STATIC?12:0}}>
        <b className="small" style={{color:"var(--ssa-blue)"}}>Evaluate a vendor</b>
        <select className="pill" style={{padding:"7px 10px"}} value={vendor} onChange={e=>setVendor(e.target.value)}>
          {vendors.map(v=>(<option key={v.name} value={v.name}>{v.name}</option>))}
        </select>
        {!STATIC && <>
          {/* hidden native input, triggered by a styled button */}
          <input ref={fileRef} type="file" multiple accept={ACCEPT} style={{display:"none"}}
                 onChange={e=>{addFiles(e.target.files); e.target.value="";}}/>
          <button className="btn ghost" onClick={()=>fileRef.current?.click()}>+ Upload proposal files</button>
          <button className="btn" onClick={()=>run(false)} disabled={busy || !hasSources}>
            Run on uploaded sources</button>
          <button className="btn ghost" onClick={()=>run(true)} disabled={busy}>Run on sample</button>
        </>}
        {STATIC && <button className="btn" onClick={()=>run(true)} disabled={busy}>Show evaluation</button>}
        {busy && !STATIC && <span className="small" style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="spin"/>{prog||"Working…"}
          <button className="btn ghost" onClick={cancel} style={{padding:"4px 10px"}}>Cancel</button>
        </span>}
      </div>

      {!STATIC && (
        <div className="grid source-grid"
             onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault(); addFiles(e.dataTransfer.files);}}>
          <div>
            <div className="small muted" style={{marginBottom:4}}>Accepted: PDF, DOCX, XLSX, TXT, MD — drag &amp; drop or use the button. Multiple files per vendor OK.</div>
            {files.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {files.map((f,i)=>(<span key={i} className="pill">{f.name} <span style={{cursor:"pointer",color:"var(--bad)"}} onClick={()=>removeFile(i)}>&#10005;</span></span>))}
            </div>}
          </div>
          <div>
            <div className="small muted" style={{marginBottom:4}}>…or paste vendor URL(s) — one per line (portal link, shared doc, hosted PDF).</div>
            <textarea value={urls} onChange={e=>setUrls(e.target.value)} rows={2}
              placeholder="https://vendor.com/our-response.pdf"
              style={{width:"100%",border:"1px solid var(--line)",borderRadius:8,padding:"8px 10px",fontFamily:"var(--font)",fontSize:13}}/>
          </div>
        </div>
      )}

      {isMock && !STATIC && hasSources && <div className="small" style={{color:"var(--warn)",marginTop:8}}>
        &#9888; A live model is recommended for real proposals — the offline "mock" engine doesn’t read uploaded content deeply. Pick a model (top-right).
      </div>}
      {msg && <div className="small" style={{marginTop:8,color: msg.ok?"var(--good)":"var(--bad)"}}>
        {msg.text}{msg.ingest && <div className="muted">{msg.ingest}</div>}</div>}
    </div>
  );
}

// ---- batch runner: many vendors, one parallel run, live board -------------
const REQ_TOTAL = 422; // requirements in data/requirements.json; used only for the ~estimate
function newRow(){ return {id:(crypto.randomUUID?crypto.randomUUID():String(Date.now())+Math.random()), vendor:"", files:[], urls:""}; }
function BatchRunner({vendors, model, voteMode, voteModel, voteDual, onDone}){
  const [rows,setRows]=useState([newRow()]);
  const [confirm,setConfirm]=useState(null); // {text} pre-flight estimate, or null
  const [board,setBoard]=useState(null);     // [{vendor, job_id, stage, scored, total, done, error}]
  const [busy,setBusy]=useState(false);
  const [msg,setMsg]=useState(null);
  const ACCEPT=".pdf,.docx,.xlsx,.xlsm,.txt,.md";

  function setRow(i,patch){ setRows(rs=>rs.map((r,j)=>j===i?{...r,...patch}:r)); }
  function addRow(){ setRows(rs=>[...rs,newRow()]); }
  function removeRow(i){ setRows(rs=>rs.length>1?rs.filter((_,j)=>j!==i):rs); }
  function addFiles(i,list){ setRow(i,{files:[...rows[i].files,...Array.from(list)]}); }
  function removeFile(i,k){ setRow(i,{files:rows[i].files.filter((_,j)=>j!==k)}); }

  const valid = rows.filter(r=>r.vendor.trim() && (r.files.length>0 || r.urls.trim().length>0));
  const isMock = model==="mock";

  function preflight(){
    if(!valid.length){ setMsg({ok:false,text:"Add at least one vendor with a file or URL."}); return; }
    if(isMock){ launch(); return; } // free offline engine - no estimate needed
    const scoringPer=Math.ceil(REQ_TOTAL/12);
    const votePer=voteMode==="dual"?3:1;
    const n=valid.length;
    const text=`${n} vendor(s) x ~${scoringPer} = ~${n*scoringPer} scoring calls (${model})`
      +` + ${n*votePer} vote call(s) (${voteMode==="dual"?"dual":voteModel}). Proceed?`;
    setConfirm({text});
  }

  async function launch(){
    setConfirm(null); setBusy(true); setMsg(null);
    const fd=new FormData();
    fd.append("count",String(valid.length));
    fd.append("scoring_model",model);
    if(voteMode==="dual") fd.append("vote_dual",JSON.stringify(voteDual)); else fd.append("vote_model",voteModel);
    valid.forEach((r,i)=>{
      fd.append("vendor_"+i,r.vendor.trim());
      fd.append("urls_"+i,r.urls);
      r.files.forEach(f=>fd.append("files_"+i,f));
    });
    let res;
    try{
      const r=await fetch("/api/evaluate_batch",{method:"POST",body:fd});
      res=await r.json();
    }catch(e){ setBusy(false); setMsg({ok:false,text:"Batch upload failed - files may exceed the size limit, or the server is unreachable."}); return; }
    if(res.error){ setBusy(false); setMsg({ok:false,text:"Error: "+res.error}); return; }
    const init=res.jobs.map(j=>({...j, stage:"queued", scored:0, total:0, done:false, error:null}));
    setBoard(init);
    if(res.rejected && res.rejected.length) setMsg({ok:false,text:"Skipped: "+res.rejected.map(x=>x.vendor+" ("+x.reason+")").join("; ")});
    pollAll(init);
  }

  async function pollAll(jobs){
    const live={}; jobs.forEach(j=>live[j.job_id]=true);
    try{
      while(Object.values(live).some(Boolean)){
        await new Promise(r=>setTimeout(r,900));
        await Promise.all(jobs.map(async j=>{
          if(!live[j.job_id]) return;
          let s;
          try{ s=await jget("/api/evaluate/status/"+j.job_id); }
          catch(e){ return; } // transient (network/502): skip this tick, retry next loop
          if(!s || s.error===undefined && s.stage===undefined && s.done===undefined) return; // unparseable body: retry next loop
          setBoard(b=>b.map(x=>x.job_id===j.job_id?{...x, stage:s.stage, scored:s.scored, total:s.total, done:s.done, error:s.error}:x));
          if(s.done || s.error){ live[j.job_id]=false; }
        }));
      }
    } finally {
      setBusy(false); onDone();
    }
  }
  async function cancelOne(jid){ await jpost("/api/evaluate/cancel/"+jid,{}); }

  const doneCount = board ? board.filter(b=>b.done).length : 0;

  return (
    <div>
      <div className="card" style={{marginBottom:14}}>
        <b className="small" style={{color:"var(--ssa-blue)"}}>Batch evaluate - run several vendors in parallel</b>
        {STATIC && <div className="small muted" style={{marginTop:6}}>Batch runs need the live server (the offline standalone is single-vendor only).</div>}
        {!STATIC && <>
          <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:10}}>
            {rows.map((r,i)=>(
              <div key={r.id} className="grid" style={{gridTemplateColumns:"180px 1fr auto",gap:8,alignItems:"start"}}>
                <input className="pill" style={{padding:"8px 10px"}} placeholder="Vendor name"
                       value={r.vendor} onChange={e=>setRow(i,{vendor:e.target.value})}/>
                <div onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault(); addFiles(i,e.dataTransfer.files);}}>
                  <label className="btn ghost" style={{cursor:"pointer"}}>
                    + Files
                    <input type="file" multiple accept={ACCEPT} style={{display:"none"}}
                           onChange={e=>{addFiles(i,e.target.files); e.target.value="";}}/>
                  </label>
                  {r.files.length>0 && <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
                    {r.files.map((f,k)=>(<span key={k} className="pill">{f.name} <span style={{cursor:"pointer",color:"var(--bad)"}} onClick={()=>removeFile(i,k)}>&#10005;</span></span>))}
                  </div>}
                  <textarea value={r.urls} onChange={e=>setRow(i,{urls:e.target.value})} rows={1}
                    placeholder="or paste URL(s) - one per line"
                    style={{width:"100%",marginTop:6,border:"1px solid var(--line)",borderRadius:8,padding:"6px 8px",fontFamily:"var(--font)",fontSize:13}}/>
                </div>
                <button className="btn ghost" style={{padding:"6px 10px"}} onClick={()=>removeRow(i)} disabled={rows.length<=1}>Remove</button>
              </div>
            ))}
          </div>
          <div style={{marginTop:10,display:"flex",gap:8,alignItems:"center"}}>
            <button className="btn ghost" onClick={addRow}>+ Add vendor</button>
            <button className="btn" onClick={preflight} disabled={busy || !valid.length}>Run all ({valid.length})</button>
            {busy && <span className="small"><span className="spin"/> running&#8230;</span>}
          </div>
          {isMock && valid.length>0 && <div className="small" style={{color:"var(--warn)",marginTop:8}}>
            &#9888; A live model is recommended for real proposals - the offline "mock" engine doesn't read uploaded content deeply.
          </div>}
          {msg && <div className="small" style={{marginTop:8,color:msg.ok?"var(--good)":"var(--bad)"}}>{msg.text}</div>}
        </>}
      </div>

      {confirm && <div className="card" style={{marginBottom:14,borderColor:"var(--ssa-blue)"}}>
        <div className="small">{confirm.text}</div>
        <div style={{marginTop:8,display:"flex",gap:8}}>
          <button className="btn" onClick={launch}>Run all</button>
          <button className="btn ghost" onClick={()=>setConfirm(null)}>Cancel</button>
        </div>
      </div>}

      {board && <div className="card">
        <b className="small">Batch run - {doneCount} of {board.length} done</b>
        <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:8}}>
          {board.map(b=>{
            const pct = b.total ? Math.round(100*b.scored/b.total) : (b.done?100:4);
            const state = b.error ? "error" : (b.done ? "done" : (b.stage||"queued"));
            return (
              <div key={b.job_id} className="grid" style={{gridTemplateColumns:"160px 1fr 120px",gap:10,alignItems:"center"}}>
                <span className="small" style={{fontWeight:600}}>{b.vendor}</span>
                <div style={{background:"var(--line)",borderRadius:6,height:10,overflow:"hidden"}}>
                  <div style={{width:pct+"%",height:"100%",background:b.error?"var(--bad)":"var(--ssa-blue)"}}/>
                </div>
                <span className="small muted">
                  {b.error ? ("error") :
                    b.done ? (<a href="#" onClick={e=>{e.preventDefault(); onDone();}}>done - view in Dashboard</a>) :
                    (<>{b.total?`${b.scored}/${b.total}`:state} <span style={{cursor:"pointer",color:"var(--bad)"}} onClick={()=>cancelOne(b.job_id)}>&#10005;</span></>)}
                </span>
              </div>
            );
          })}
        </div>
      </div>}
    </div>
  );
}

// ---- app -----------------------------------------------------------------
function App(){
  const [tab,setTab]=useState("dashboard");
  const [models,setModels]=useState(null);
  const [model,setModel]=useState("mock");        // scoring model
  const [voteMode,setVoteMode]=useState("single"); // "single" | "dual"
  const [voteModel,setVoteModel]=useState("mock");  // single-vote model
  const [voteDual,setVoteDual]=useState({openai:"",anthropic:"",synthesizer:"claude-opus-4-8"});
  const [results,setResults]=useState([]);
  const [vendors,setVendors]=useState([]);
  const [kb,setKb]=useState(null);
  const [open,setOpen]=useState(null);
  const [logo,setLogo]=useState("");

  async function loadResults(){ setResults(await jget("/api/results")); }
  useEffect(()=>{
    (async()=>{
      const m=await jget("/api/models"); setModels(m);
      setModel(m.task_defaults?.scoring && m.providers.some(p=>p.key_present&&p.models.some(x=>x.id===m.task_defaults.scoring)) ? m.task_defaults.scoring : m.default_model);
      const td = m.task_defaults || {};
      const has = id => m.providers.some(p=>p.key_present && p.models.some(x=>x.id===id));
      setVoteModel(has(td.vote_synthesis) ? td.vote_synthesis : m.default_model);
      if(td.dual_vote) setVoteDual({openai:td.dual_vote.openai||"", anthropic:td.dual_vote.anthropic||"", synthesizer:td.dual_vote.synthesizer||"claude-opus-4-8"});
      setVendors((await jget("/api/vendors")).vendors||[]);
      setKb(await jget("/api/knowledge"));
      await loadResults();
      if(STATIC){ setLogo(BOOT.logo||""); }
      else { try{ const t=await (await fetch("/ssa_logo_long_white_b64.txt")).text(); setLogo(t.trim()); }catch(e){} }
    })();
  },[]);
  useEffect(()=>{
    if(results.length && !results.some(r=>r.vendor===open)) setOpen(results[0].vendor);
  },[results,open]);

  const openData = open ? results.find(r=>r.vendor===open) : null;
  const anyLive = models?.providers?.some(p=>p.key_present && p.id!=="mock");

  return (
    <div>
      <header className="app">
        <div className="bar">
          {logo ? <img src={logo} alt="SSA & Company"/> : <b style={{fontSize:18}}>SSA &amp; Company</b>}
          <div className="title">FSM RFP Evaluation Agent
            <small>Service Logic · Field Service Management platform selection</small></div>
          <div className="spacer"/>
          <ModelControls models={models} scoring={model} setScoring={setModel}
            voteMode={voteMode} setVoteMode={setVoteMode} voteModel={voteModel} setVoteModel={setVoteModel}
            voteDual={voteDual} setVoteDual={setVoteDual}/>
        </div>
      </header>

      <nav className="tabs"><div className="inner">
        {[["dashboard","Dashboard"],["detail","Vendor detail"],["compare","Compare"],["batch","Batch evaluate"],["method","Methodology & rubric"],["chat","Ask the agent"]].map(([k,l])=>(
          <button key={k} className={tab===k?"active":""} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div></nav>

      <div className="wrap" style={{paddingTop:18,paddingBottom:30}}>
        {!anyLive && <div className="demowarn">
          No live model API key detected — running the <b>offline demo engine</b>. Scores are deterministic and grounded in the research dossier (clearly labelled "demo"). Set <code>ANTHROPIC_API_KEY</code> or <code>OPENAI_API_KEY</code> and pick a model (top-right) for a live LLM read. Vendor proposals are due July 2; until then the app runs on synthetic sample proposals.
        </div>}

        <div className="card" style={{marginBottom:18}}>
          <RunBar vendors={vendors} model={model} voteMode={voteMode} voteModel={voteModel} voteDual={voteDual} onDone={loadResults}/>
        </div>

        {tab==="dashboard" && <Dashboard results={results} onOpen={(v)=>{setOpen(v);setTab("detail");}}/>}
        {tab==="compare" && <Compare results={results}/>}
        {tab==="batch" && <BatchRunner vendors={vendors} model={model} voteMode={voteMode} voteModel={voteModel} voteDual={voteDual} onDone={loadResults}/>}
        {tab==="detail" && (
          <div>
            <div className="vendor-pills">
              {results.map(r=>(
                <button key={r.vendor} className={"pill"} style={{cursor:"pointer",
                  borderColor: open===r.vendor?"var(--ssa-blue)":"var(--line)",
                  color: open===r.vendor?"var(--ssa-blue)":"var(--muted)",
                  fontWeight: open===r.vendor?600:400}}
                  onClick={()=>setOpen(r.vendor)}>{r.vendor}</button>
              ))}
            </div>
            {openData ? <VendorDetail data={openData}/> : <p className="muted">Pick a vendor above.</p>}
          </div>
        )}
        {tab==="method" && <Methodology kb={kb}/>}
        {tab==="chat" && <Chat model={model}/>}
      </div>

      <footer className="app">
        Prepared by SSA &amp; Company · Confidential &amp; Proprietary · FSM RFP Evaluation Agent (research preview).
        The agent casts an advisory vote to augment — not replace — the human evaluation committee.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
